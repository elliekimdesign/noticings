<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pinned — San Francisco</title>
  <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@300;400;500;600;700&family=Bricolage+Grotesque:opsz,wght@12..96,300;12..96,400;12..96,500;12..96,600;12..96,700&family=Cardo:wght@400;700&family=Cormorant+Garamond:wght@300;400;500;600;700&family=DM+Serif+Display:ital@0;1&family=EB+Garamond:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600;9..144,700&family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@300;400;500;600;700&family=Gilda+Display&family=Gloock&family=Jacques+Francois&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100vw; height: 100vh; overflow: hidden;
      background: #f7f3ea;
      font-family: 'Archivo', 'Helvetica Neue', sans-serif;
    }

    /* ── Top masthead — split by the spine line at x=220px ── */
    #masthead {
      position: fixed; top: 0; left: 0; right: 0;
      height: 44px; z-index: 1000;
      background: #f7f3ea;
      border-bottom: 1.5px solid rgba(30,30,30,0.55);
      display: flex; align-items: center;
      padding: 0;
    }
    #masthead .title {
      font-family: 'Geist', 'Inter', 'Helvetica Neue', sans-serif;
      font-size: 15px; letter-spacing: 0.04em;
      color: #1a1a1a; font-weight: 700;
      display: flex; align-items: center; justify-content: flex-start;
      text-transform: uppercase;
      width: 320px;
      flex-shrink: 0;
      height: 100%;
      padding-left: 24px;
      box-sizing: border-box;
      line-height: 1;
    }
    #masthead .title .logo {
      display: inline-flex;
      align-items: baseline;
    }
    #masthead .title .logo span {
      display: inline-block;
    }
    /* P I N D sit on the baseline; second N jumps up a little; E jumps up more */
    #masthead .title .logo .l-p,
    #masthead .title .logo .l-i,
    #masthead .title .logo .l-n1,
    #masthead .title .logo .l-d { transform: translateY(0); }
    #masthead .title .logo .l-n2,
    #masthead .title .logo .l-e { transform: translateY(-3px); }
    #masthead .right-cell {
      flex: 1;
      height: 100%;
      position: relative;
      display: flex; align-items: center;
      padding: 0 24px;
    }
    #masthead .city-center {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      font-family: 'Geist', 'Inter', 'Helvetica Neue', sans-serif;
      font-size: 14px;
      font-weight: 700;
      color: #1a1a1a;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      pointer-events: none;
    }
    #masthead .add-btn-wrap {
      margin-left: auto;
    }
    /* ── Left archive rail — full-height column ── */
    #archive-rail {
      position: fixed;
      top: 44px;
      left: 0;
      bottom: 36px;
      width: 320px;
      z-index: 900;
      background: #f7f3ea;
      padding: 0;
      overflow-y: auto;
      box-sizing: border-box;
    }
    /* The vertical spine line — runs the entire viewport height */
    #archive-spine {
      position: fixed;
      top: 0;
      bottom: 0;
      left: 320px;
      width: 1px;
      background: rgba(30,30,30,0.55);
      z-index: 1100;
      pointer-events: none;
    }
    /* Stack of assignment cards — the top one is large/full, the rest are compact */
    #archive-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    #archive-list .archive-item {
      display: block;
      width: 100%;
      text-align: left;
      background: transparent;
      border: none;
      border-bottom: 1px solid #1a1a1a;
      padding: 20px 24px;
      cursor: pointer;
      font-family: 'Geist', 'Inter', sans-serif;
      box-sizing: border-box;
      transition: background 0.15s ease;
    }
    #archive-list .archive-item:first-child { border-top: 1px solid #1a1a1a; }
    /* Top (current) card — full sentence, big */
    #archive-list .archive-item.is-current {
      padding: 26px 24px 30px;
    }
    #archive-list .archive-item .label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #1a1a1a;
      margin-bottom: 14px;
    }
    #archive-list .archive-item.is-current .question {
      font-family: 'Geist', 'Inter', sans-serif;
      font-size: 22px;
      font-weight: 400;
      line-height: 1.3;
      letter-spacing: -0.005em;
      color: #1a1a1a;
      word-break: normal;
      overflow-wrap: break-word;
    }
    /* Past cards — compact, single line */
    #archive-list .archive-item.is-past {
      padding: 14px 24px;
      display: flex;
      align-items: baseline;
      gap: 12px;
    }
    #archive-list .archive-item.is-past .label {
      margin-bottom: 0;
      flex-shrink: 0;
      font-weight: 600;
      color: #1a1a1a;
    }
    #archive-list .archive-item.is-past .question {
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(26,26,26,0.65);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
      transition: color 0.15s ease;
    }
    #archive-list .archive-item.is-past:hover { background: rgba(26,26,26,0.03); }
    #archive-list .archive-item.is-past:hover .question { color: #1a1a1a; }
    #archive-list .archive-item.is-past.active .question { color: #1a1a1a; font-weight: 600; }

    /* ── Answer sheet positioning — vertically centered on the right ── */
    #sheet-wrap {
      position: fixed;
      right: 24px;
      top: 50%;
      transform: translateY(-50%);
      z-index: 1500;
    }

    /* ── Eye-mode question pill — only visible when body.spotlight-on ── */
    #eye-q-banner {
      display: none;
      position: fixed;
      right: 24px;
      top: 50%;
      transform: translateY(-50%);
      z-index: 1500;
      background: #1a1a1a;
      color: #ffffff;
      padding: 12px 22px;
      width: 360px;
      height: 64px;
      box-sizing: border-box;
      align-items: center;
    }
    body.spotlight-on #eye-q-banner { display: flex; }
    #eye-q-banner .q-text {
      flex: 1;
      font-size: 10px;
      line-height: 1.5;
      letter-spacing: 0.22em;
      font-weight: 500;
      text-transform: uppercase;
      padding-right: 12px;
      overflow: hidden;
    }
    #eye-q-banner .q-next {
      width: 26px;
      height: 26px;
      border: none;
      background: transparent;
      cursor: pointer;
      padding: 0;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.2s ease, opacity 0.2s ease;
      opacity: 0.65;
    }
    #eye-q-banner .q-next:hover {
      opacity: 1;
      transform: translateY(2px);
    }
    #eye-q-banner .q-next svg {
      width: 18px;
      height: 18px;
      display: block;
    }
    /* + button in the masthead — plain inline icon, no box */
    .add-btn {
      border: none;
      background: transparent;
      color: #1a1a1a;
      cursor: pointer;
      padding: 0;
      width: 22px;
      height: 22px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s ease, color 0.2s ease;
    }
    .add-btn svg {
      width: 22px;
      height: 22px;
      display: block;
      stroke: currentColor;
      stroke-width: 1;
      stroke-linecap: round;
      fill: none;
      transition: stroke 0.2s ease;
    }
    .add-btn:hover { transform: rotate(90deg); }
    .add-btn.active { transform: rotate(45deg); color: #1a1a1a; }

    /* Landmark recall button — Romanesque carved capital from Vézelay cloister */
    .landmark-btn {
      position: fixed;
      bottom: 48px;
      right: 24px;
      width: 80px;
      height: 80px;
      z-index: 1050;
      border: none;
      background: transparent;
      padding: 0;
      cursor: pointer;
      opacity: 0.65;
      transition: opacity 0.3s ease, transform 0.3s ease;
    }
    .landmark-btn img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      mix-blend-mode: multiply;
    }
    .landmark-btn:hover {
      opacity: 1;
      transform: scale(1.06);
    }
    body.spotlight-on .landmark-btn { display: none; }

    /* Landmark "museum vitrine" card — fades in centered when a landmark is shown */
    .landmark-card {
      position: fixed;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%) scale(0.95);
      z-index: 1600;
      background: #ffffff;
      border: 1.5px solid rgba(26,26,26,0.45);
      padding: 24px 28px 20px;
      width: 320px;
      text-align: center;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.4s ease, transform 0.4s cubic-bezier(0.65, 0, 0.35, 1);
      font-family: 'Geist', sans-serif;
    }
    .landmark-card.show {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
      pointer-events: auto;
    }
    .landmark-card-image {
      width: 100%;
      max-height: 180px;
      object-fit: contain;
      margin-bottom: 14px;
      mix-blend-mode: multiply;
    }
    .landmark-card-name {
      font-size: 11px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 4px;
    }
    .landmark-card-date {
      font-family: 'Fraunces', serif;
      font-style: italic;
      font-size: 11px;
      color: rgba(26,26,26,0.55);
      font-weight: 400;
    }

    /* Victorian eye toggle — floats below the masthead, right side */
    .eye-toggle {
      position: fixed;
      top: 56px;
      right: 22px;
      width: 36px;
      height: 28px;
      z-index: 1000;
      cursor: pointer;
      background: transparent;
      border: none;
      padding: 0;
      opacity: 0.55;
      transition: opacity 0.3s ease, transform 0.2s ease;
    }
    .eye-toggle:hover { opacity: 0.85; transform: scale(1.05); }
    .eye-toggle.active { opacity: 0.95; }
    .eye-toggle svg {
      width: 100%;
      height: 100%;
      display: block;
      overflow: visible;
    }

    /* Spotlight overlay — dims the map when revealed */
    body.spotlight-on::after {
      content: '';
      position: fixed;
      top: 44px; bottom: 36px; left: 320px; right: 0;
      background: rgba(26,26,26,0.30);
      pointer-events: none;
      z-index: 5;
    }
    /* Eye mode: hide chrome and the flat dim — the map's spotlight mask handles dimming */
    body.spotlight-on #masthead,
    body.spotlight-on #footer,
    body.spotlight-on #archive-rail,
    body.spotlight-on #archive-spine { display: none !important; }
    body.spotlight-on::after { display: none !important; }
    /* Eye mode: let the map fill the full viewport */
    body.spotlight-on #map-pane { width: 100vw !important; height: 100vh !important; }
    body.spotlight-on { padding-top: 0 !important; padding-bottom: 0 !important; padding-left: 0 !important; }

    /* Idle: all answer pins hidden by default. Revealed rules sit further down with the marker styles. */

    /* Hint banner — appears when answer mode is active */
    #hint {
      position: fixed; top: 56px; left: 50%; transform: translateX(-50%);
      z-index: 1100;
      background: #1a1a1a; color: #ffffff;
      padding: 8px 18px;
      font-size: 9px; letter-spacing: 0.28em;
      pointer-events: none;
      opacity: 0; transition: opacity 0.3s ease;
    }
    #hint.show { opacity: 1; }

    /* Pending pin — Victorian-style pointing hand (manicule) */
    .pending-pin {
      width: 48px;
      height: 48px;
      pointer-events: none;
    }
    .pending-pin svg {
      width: 100%;
      height: 100%;
      display: block;
      overflow: visible;
      animation: handBob 1.6s ease-in-out infinite;
    }
    @keyframes handBob {
      0%, 100% { transform: translate(0, 0); }
      50%      { transform: translate(0, -3px); }
    }

    /* ── Answer sheet — minimal white note ── */
    #sheet {
      width: 360px;
      box-sizing: border-box;
      max-height: 0;
      opacity: 0;
      overflow: hidden;
      pointer-events: none;
      transition: max-height 0.4s ease, opacity 0.3s ease;
      display: flex; flex-direction: column;
      gap: 14px;
      position: relative;
      background: #ffffff;
      border: 1px solid #1a1a1a;
      padding: 18px 20px;
    }
    #sheet.show {
      max-height: 280px;
      opacity: 1;
      pointer-events: auto;
    }
    #sheet .sheet-bg { display: none; }
    #sheet .sheet-q { display: none; }
    #sheet .sheet-q-text { display: none; }

    /* Header — coordinates on the left, neighborhood on the right */
    #sheet .sheet-head {
      padding: 0;
      margin: 0;
    }
    #sheet .sheet-loc {
      display: flex;
      flex-direction: row;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      background: transparent;
      padding: 0;
    }
    #sheet .loc-coords {
      order: 1;
      font-family: 'Geist Mono', ui-monospace, 'SF Mono', Menlo, monospace;
      font-size: 11px;
      font-weight: 400;
      color: rgba(26, 26, 26, 0.55);
      letter-spacing: 0.02em;
      text-transform: none;
      font-feature-settings: "tnum";
      background: transparent;
      padding: 0;
    }
    #sheet .loc-coords:empty::before {
      content: '— — — · — — —';
      color: rgba(26, 26, 26, 0.30);
    }
    #sheet .loc-name {
      order: 2;
      font-family: 'Geist Mono', ui-monospace, 'SF Mono', Menlo, monospace;
      font-size: 11px;
      font-weight: 500;
      color: rgba(26, 26, 26, 0.85);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: transparent;
      padding: 0;
      text-align: right;
    }
    #sheet .loc-name.is-prompt {
      font-weight: 400;
      font-style: italic;
      letter-spacing: 0.02em;
      text-transform: none;
      color: rgba(26, 26, 26, 0.40);
    }

    /* Body — plain textarea, no ruled lines */
    #sheet .sheet-body { padding: 0; width: 100%; }
    #sheet textarea.answer-field {
      width: 100%;
      min-height: 72px;
      border: none;
      outline: none;
      resize: none;
      font-family: 'Geist', 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 20px;
      line-height: 1.35;
      font-weight: 400;
      letter-spacing: -0.005em;
      color: #1a1a1a;
      padding: 0;
      background: transparent;
      overflow-wrap: break-word;
      word-break: break-word;
      overflow-y: auto;
    }
    #sheet textarea.answer-field::placeholder {
      color: rgba(26, 26, 26, 0.35);
      font-style: normal;
    }

    /* Footer row — character counter (left) + pin it link (right) */
    #sheet .sheet-foot {
      display: flex;
      flex-direction: row;
      align-items: baseline;
      justify-content: space-between;
      width: 100%;
      gap: 12px;
    }
    #sheet .char-count {
      font-family: 'Geist Mono', ui-monospace, 'SF Mono', Menlo, monospace;
      font-size: 11px;
      font-weight: 400;
      color: rgba(26, 26, 26, 0.40);
      letter-spacing: 0.02em;
      font-feature-settings: "tnum";
      transition: color 0.15s ease;
    }
    #sheet .char-count.is-near-limit {
      color: rgba(26, 26, 26, 0.85);
    }

    /* Submit — small text link */
    #sheet .submit-arrow {
      border: none;
      background: transparent;
      color: #1a1a1a;
      cursor: pointer;
      padding: 0;
      font-family: 'Geist Mono', ui-monospace, 'SF Mono', Menlo, monospace;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.02em;
      text-transform: none;
      transition: opacity 0.15s ease;
    }
    #sheet .submit-arrow:hover { opacity: 0.55; }
    #sheet .submit-arrow:disabled { opacity: 0.25; cursor: not-allowed; }
    #sheet .submit-arrow:disabled:hover { opacity: 0.25; }

    /* When sheet is open, raise the body padding so map doesn't hide behind it */

    /* Lift map markers above map content */
    .maplibregl-marker { z-index: 10; }

    /* User-placed answer pin — collapsed = thin orange bookmark; expanded (on click) = horizontal bar with the answer text inside */
    .answer-marker {
      cursor: pointer;
      position: relative;
      transition: opacity 0.5s ease;
      display: inline-flex;
      align-items: center;
      opacity: 1;
      pointer-events: auto;
    }
    /* Spotlight (eye) mode still hides non-matching pins via .dim */
    .answer-marker.dim { opacity: 0; pointer-events: none; }

    /* The bookmark / bar itself — collapsed is a tall thin rectangle, expanded stretches horizontally */
    .answer-note {
      position: relative;
      background: #FF8000;
      color: #ffffff;
      font-family: 'Geist', 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 11px;
      line-height: 1.4;
      font-weight: 500;
      letter-spacing: 0.01em;
      text-transform: none;
      pointer-events: none;
      box-sizing: border-box;
      /* Collapsed (default): small solid orange square, no text visible */
      width: 14px;
      height: 14px;
      padding: 0;
      overflow: hidden;
      white-space: nowrap;
      font-size: 0;
      transition: width 0.28s ease, height 0.28s ease, padding 0.28s ease, font-size 0.18s ease;
    }
    /* Expanded (on click): bar extends horizontally, shows the answer text inside */
    .answer-marker.is-open .answer-note {
      width: auto;
      max-width: 280px;
      height: auto;
      min-height: 20px;
      padding: 6px 12px;
      white-space: normal;
      font-size: 11px;
      overflow-wrap: break-word;
      word-break: break-word;
    }
    .answer-note .q { display: none; }
    /* Answer mode: change cursor on map */
    #map-pane { cursor: crosshair; }

    body {
      padding-top: 44px;
      padding-bottom: 36px;
      padding-left: 320px;
    }

    /* ── Map: fills the right column between masthead and footer ── */
    #map-pane {
      width: calc(100vw - 320px);
      height: calc(100vh - 80px);
      position: relative;
    }

    /* ── Bottom static label bar — split by the spine line ── */
    #footer {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: 36px; z-index: 1400;
      background: #f7f3ea;
      border-top: 1.5px solid rgba(30,30,30,0.55);
      display: flex; align-items: center;
      padding: 0;
    }
    #footer .footer-left {
      width: 320px;
      flex-shrink: 0;
      height: 100%;
      display: flex; align-items: center; justify-content: flex-start;
      gap: 10px;
      padding: 0 24px;
      box-sizing: border-box;
      font-family: 'Geist', 'Inter', sans-serif;
      font-size: 9px;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: rgba(26,26,26,0.85);
      font-weight: 500;
    }
    #footer .footer-left .sep { color: rgba(26,26,26,0.3); }
    #footer .footer-right {
      flex: 1;
      height: 100%;
      display: flex; align-items: center;
      padding: 0 24px;
    }
    #footer .label {
      font-size: 9px; letter-spacing: 0.32em;
      color: rgba(26,26,26,0.55);
      font-weight: 400;
      flex: 1;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    #footer .label .sep {
      color: rgba(26,26,26,0.25);
    }
    #footer .label .strong {
      color: rgba(26,26,26,0.85);
      font-weight: 500;
    }
    #footer .volume {
      margin-left: auto;
      font-family: 'Jacques Francois', 'Times New Roman', serif;
      font-size: 11px;
      font-weight: 400;
      color: rgba(26,26,26,0.65);
      letter-spacing: 0.15em;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    #footer .volume .sep { color: rgba(26,26,26,0.3); }
    #footer .footer-end {
      margin-left: auto;
      font-family: 'Geist', 'Inter', sans-serif;
      font-size: 9px;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: rgba(26,26,26,0.55);
      font-weight: 400;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    #footer .footer-end .footer-end-link {
      color: inherit;
      text-decoration: underline;
      text-underline-offset: 3px;
      text-decoration-thickness: 1px;
      transition: color 0.15s ease;
    }
    #footer .footer-end .footer-end-link:hover { color: #1a1a1a; }

    /* ── Swiss-graphic pin ── */
    .ink-marker {
      width: 26px; height: 56px;
      cursor: pointer;
      transition: transform 0.25s ease;
    }
    .ink-marker:hover { transform: translateY(-3px); }
    .ink-marker svg { width: 100%; height: 100%; display: block; overflow: visible; }

    /* Popup card — quiet museum label */
    .maplibregl-popup-content {
      padding: 0 !important;
      border-radius: 0 !important;
      box-shadow: 0 8px 30px rgba(20,20,20,0.10), 0 0 0 0.5px rgba(26,26,26,0.12) !important;
      background: #ffffff !important;
    }
    .maplibregl-popup-tip { display: none !important; }
    .maplibregl-popup-close-button {
      color: rgba(26,26,26,0.4) !important;
      font-size: 16px !important;
      padding: 4px 8px !important;
      font-family: 'Archivo', sans-serif !important;
    }
    .pop {
      padding: 16px 18px 14px;
      min-width: 200px; max-width: 240px;
      font-family: 'Archivo', sans-serif;
    }
    .pop .label {
      font-size: 7.5px; letter-spacing: 0.32em;
      color: rgba(26,26,26,0.5);

<script>
const map = new maplibregl.Map({
  container: 'map',
  style: 'https://tiles.openfreemap.org/styles/liberty',
  center: [-122.4194, 37.7749],
  zoom: 12.5, pitch: 48, bearing: -16,
  maxBounds: [[-122.562, 37.639],[-122.327, 37.930]],
  minZoom: 10, maxZoom: 20, attributionControl: false,
});

map.on('style.load', () => {
  const layers = map.getStyle().layers;

  for (const { id, type } of layers) {
    try {
      if (type === 'symbol' || type === 'fill-extrusion') { map.removeLayer(id); continue; }
      if (id === 'background') { map.setPaintProperty(id, 'background-color', '#f4f4f5'); continue; }

      if (/water|ocean|sea|bay|lake|river/.test(id)) {
        if (type === 'fill') { map.setPaintProperty(id, 'fill-color', '#ffffff'); map.setPaintProperty(id, 'fill-opacity', 1); }
        if (type === 'line') { map.setPaintProperty(id, 'line-color', '#bbb'); map.setPaintProperty(id, 'line-width', 0.4); }
        continue;
      }
      if (/park|grass|wood|forest|nature|garden|cemetery|scrub|meadow|landuse|landcover|land-|earth|sand|beach|wetland/.test(id)) {
        if (type === 'fill') {
          try { map.setPaintProperty(id, 'fill-pattern', null); } catch(_) {}
          map.setPaintProperty(id, 'fill-color', '#f4f4f5');
          map.setPaintProperty(id, 'fill-opacity', 1);
        }
        if (type === 'line') map.setPaintProperty(id, 'line-opacity', 0);
        continue;
      }
      if (/motorway|trunk/.test(id)) {
        if (type === 'line') {
          map.setPaintProperty(id, 'line-color', '#555');
          map.setPaintProperty(id, 'line-opacity', 0.5);
          try { map.setPaintProperty(id, 'line-width',
            ['interpolate',['linear'],['zoom'], 10,0.5, 12,0.8, 14,1.2, 17,2]); } catch(_){}
        }
        if (type === 'fill') map.setPaintProperty(id, 'fill-opacity', 0);
        continue;
      }
      if (/primary|secondary/.test(id)) {
        if (type === 'line') {
          map.setPaintProperty(id, 'line-color', '#555');
          map.setPaintProperty(id, 'line-opacity', 0.45);
          try { map.setPaintProperty(id, 'line-width',
            ['interpolate',['linear'],['zoom'], 10,0.4, 12,0.6, 14,0.9, 17,1.5]); } catch(_){}
        }
        if (type === 'fill') map.setPaintProperty(id, 'fill-opacity', 0);
        continue;
      }
      if (/road|street|tertiary|minor|service/.test(id)) {
        if (type === 'line') {
          map.setPaintProperty(id, 'line-color', '#555');
          map.setPaintProperty(id, 'line-opacity', 0.55);
          try { map.setPaintProperty(id, 'line-width',
            ['interpolate',['linear'],['zoom'], 12,0.15, 14,0.35, 17,0.8]); } catch(_){}
        }
        if (type === 'fill') map.setPaintProperty(id, 'fill-opacity', 0);
        continue;
      }
      if (/path|footway|cycleway|pedestrian|rail|transit/.test(id)) {
        if (type === 'line') map.setPaintProperty(id, 'line-opacity', 0);
        continue;
      }
      if (/building/.test(id) && type === 'fill') {
        map.setPaintProperty(id, 'fill-color', '#d4d4d6');
        map.setPaintProperty(id, 'fill-opacity', 1);
        map.setPaintProperty(id, 'fill-outline-color', '#bbb');
        continue;
      }
      if (type === 'fill') { map.setPaintProperty(id, 'fill-color', '#d4d4d6'); map.setPaintProperty(id, 'fill-opacity', 1); }
      if (type === 'line') map.setPaintProperty(id, 'line-opacity', 0);
    } catch(_) {}
  }

  try {
    map.addLayer({
      id: 'contour-minor',
      type: 'line',
      source: 'openmaptiles',
      'source-layer': 'contour',
      filter: ['!=', ['%', ['get', 'ele'], 100], 0],
      paint: {
        'line-color': '#ccc',
        'line-width': ['interpolate',['linear'],['zoom'], 11,0.3, 14,0.55],
        'line-opacity': ['interpolate',['linear'],['zoom'], 11,0.5, 14,0.85, 16,0.25],
      }
    });
    map.addLayer({
      id: 'contour-major',
      type: 'line',
      source: 'openmaptiles',
      'source-layer': 'contour',
      filter: ['==', ['%', ['get', 'ele'], 100], 0],
      paint: {
        'line-color': ['interpolate',['linear'],['get','ele'], 0,'#bbb', 100,'#999', 200,'#777', 300,'#555'],
        'line-width': ['interpolate',['linear'],['zoom'], 11,0.8, 13,1.4, 15,1.8],
        'line-opacity': ['interpolate',['linear'],['zoom'], 11,0.7, 13,0.9, 16,0.35],
      }
    });
  } catch(_) {}

  map.addLayer({
    id: 'building-ink',
    type: 'line',
    source: 'openmaptiles',
    'source-layer': 'building',
    minzoom: 14,
    paint: { 'line-color': '#bbb', 'line-width': 0.35, 'line-opacity': 0.7 }
  });

  // ── SF spotlight mask: a "donut" polygon that darkens everything outside SF ──
  fetch('assets/sf-boundary.geojson')
    .then(r => r.json())
    .then(sf => {
      const outerRing = [[-180,-85],[180,-85],[180,85],[-180,85],[-180,-85]];
      const sfRings = sf.features[0].geometry.coordinates.flatMap(poly => poly);
      const donut = {
        type: 'Feature',
        properties: {},
        geometry: { type: 'Polygon', coordinates: [outerRing, ...sfRings] }
      };
      map.addSource('sf-mask', { type: 'geojson', data: donut });
      map.addLayer({
        id: 'sf-spotlight-mask',
        type: 'fill',
        source: 'sf-mask',
        paint: { 'fill-color': '#000', 'fill-opacity': 0 }
      });
    })
    .catch(_ => {});

  // ── Render any saved answers from localStorage ──
  loadSavedAnswers();
});

// ─────────── ASSIGNMENTS (one question per fortnight) ───────────
// ASSIGNMENTS[0] is the current issue; the rest are past issues, newest first.
const ASSIGNMENTS = [
  { issueNo: 7, dates: 'Apr 15 → Apr 29', text: "where do you go when you're sad?" },
  { issueNo: 6, dates: 'Apr 1 → Apr 14',  text: "where do you take your dog for a walk?" },
  { issueNo: 5, dates: 'Mar 18 → Mar 31', text: "where did you fall in love with the city?" },
  { issueNo: 4, dates: 'Mar 4 → Mar 17',  text: "where do you read on a Sunday morning?" },
  { issueNo: 3, dates: 'Feb 19 → Mar 3',  text: "where do you go when you can't sleep?" },
  { issueNo: 2, dates: 'Feb 5 → Feb 18',  text: "where do you meet a friend after work?" },
  { issueNo: 1, dates: 'Jan 22 → Feb 4',  text: "where do you go to think?" },
];

// Flat array of question strings, used by the rest of the code (markers, spotlight, etc.)
const QUESTIONS = ASSIGNMENTS.map(a => a.text);

// Index 0 = current issue. viewingIndex is which assignment is shown in the rail's
// "current" block — 0 by default, but switches when user clicks a past issue.
let currentQuestionIndex = 0;     // which question is "active" (drives the map markers)
let viewingIndex = 0;              // which assignment block is shown at the top of the rail

// Mirror so existing code (e.g. addBtn handler) can still read the active question text
const questionEl = {
  get textContent() { return QUESTIONS[currentQuestionIndex]; },
};

// Issue number formatter (07, 06, 05…)
function pad2(n) { return String(n).padStart(2, '0'); }

const archiveListEl = document.getElementById('archive-list');

function buildArchive() {
  archiveListEl.innerHTML = '';
  ASSIGNMENTS.forEach((a, i) => {
    const li = document.createElement('li');
    const btn = document.createElement('button');
    const isCurrent = i === 0;
    btn.className = 'archive-item ' + (isCurrent ? 'is-current' : 'is-past');
    btn.dataset.idx = i;
    btn.innerHTML = `
      <div class="label">${isCurrent ? 'Assignment ' : ''}#${pad2(a.issueNo)}</div>
      <div class="question">${a.text}</div>
    `;
    if (i === currentQuestionIndex) btn.classList.add('active');
    btn.addEventListener('click', () => selectQuestion(i));
    li.appendChild(btn);
    archiveListEl.appendChild(li);
  });
}

function selectQuestion(idx) {
  currentQuestionIndex = idx;
  viewingIndex = idx;
  archiveListEl.querySelectorAll('.archive-item').forEach(el => {
    el.classList.toggle('active', Number(el.dataset.idx) === idx);
  });
  if (typeof applySpotlight === 'function') applySpotlight();
}

// ── Eye-mode question pill — shows the active question and advances on click ──
const eyeQText = document.getElementById('eye-q-text');
const eyeQNext = document.getElementById('eye-q-next');
function renderEyePill() {
  eyeQText.textContent = QUESTIONS[currentQuestionIndex];
}
function advanceEyeQuestion() {
  const nextIdx = (currentQuestionIndex + 1) % QUESTIONS.length;
  selectQuestion(nextIdx);
  renderEyePill();
}
eyeQNext.addEventListener('click', (e) => {
  e.stopPropagation();
  advanceEyeQuestion();
});

// No more rotation, but keep no-op stubs in case other code references them
function startRotation() {}
function stopRotation() {}
function closeDropdown() {}  // no-op — dropdown is gone

buildArchive();
renderEyePill();

// ─────────── SF NEIGHBORHOODS — for friendly location labels ───────────
const SF_NEIGHBORHOODS = [
  { name: 'Mission', lat: 37.7599, lng: -122.4148 },
  { name: 'Mission Dolores', lat: 37.7635, lng: -122.4263 },
  { name: 'The Castro', lat: 37.7609, lng: -122.4350 },
  { name: 'Hayes Valley', lat: 37.7766, lng: -122.4243 },
  { name: 'Lower Haight', lat: 37.7714, lng: -122.4313 },
  { name: 'The Haight', lat: 37.7692, lng: -122.4481 },
  { name: 'Cole Valley', lat: 37.7660, lng: -122.4500 },
  { name: 'Inner Sunset', lat: 37.7613, lng: -122.4666 },
  { name: 'Outer Sunset', lat: 37.7558, lng: -122.4953 },
  { name: 'Inner Richmond', lat: 37.7807, lng: -122.4675 },
  { name: 'Outer Richmond', lat: 37.7799, lng: -122.4945 },

  { name: 'Nob Hill', lat: 37.7930, lng: -122.4161 },
  { name: 'North Beach', lat: 37.8062, lng: -122.4103 },
  { name: 'Chinatown', lat: 37.7941, lng: -122.4078 },
  { name: 'Financial District', lat: 37.7946, lng: -122.4006 },
  { name: 'SoMa', lat: 37.7785, lng: -122.4039 },
  { name: 'Mission Bay', lat: 37.7706, lng: -122.3893 },
  { name: 'Potrero Hill', lat: 37.7587, lng: -122.4012 },
  { name: 'Bernal Heights', lat: 37.7430, lng: -122.4156 },
  { name: 'Noe Valley', lat: 37.7506, lng: -122.4337 },
  { name: 'Glen Park', lat: 37.7338, lng: -122.4339 },
  { name: 'Twin Peaks', lat: 37.7544, lng: -122.4477 },
  { name: 'Tenderloin', lat: 37.7849, lng: -122.4143 },
  { name: 'Civic Center', lat: 37.7793, lng: -122.4193 },
  { name: 'Dogpatch', lat: 37.7575, lng: -122.3899 },
  { name: 'Bayview', lat: 37.7300, lng: -122.3877 },
  { name: 'Excelsior', lat: 37.7240, lng: -122.4318 },
  { name: 'Visitacion Valley', lat: 37.7136, lng: -122.4060 },
  { name: 'Lakeshore', lat: 37.7280, lng: -122.4900 },
];
function nearestNeighborhood([lng, lat]) {
  let best = SF_NEIGHBORHOODS[0];
  let bestDist = Infinity;
  for (const n of SF_NEIGHBORHOODS) {
    const dLat = n.lat - lat;
    const dLng = n.lng - lng;
    const d = dLat * dLat + dLng * dLng;
    if (d < bestDist) { bestDist = d; best = n; }
  }
  return best.name;
}

// ─────────── ANSWER MODE ───────────
// Map is always in answer mode — clicking anywhere drops a pin and opens the sheet.
const hint = { classList: { toggle() {} } }; // no-op: hint banner removed
const sheet = document.getElementById('sheet');
const sheetInput = document.getElementById('sheet-input');
const sheetQText = document.getElementById('sheet-q-text');
const sheetLoc = document.getElementById('sheet-loc');
const sheetCoords = document.getElementById('sheet-coords');
const sheetCancel = document.getElementById('sheet-cancel');
const sheetSubmit = document.getElementById('sheet-submit');
const sheetCount = document.getElementById('sheet-count');

function updateCount() {
  const len = sheetInput.value.length;
  sheetCount.textContent = `${len} / 100`;
  sheetCount.classList.toggle('is-near-limit', len > 85);
}
sheetInput.addEventListener('input', updateCount);

let pendingLngLat = null;
let pendingQuestion = null;
let pendingMarker = null;

function openSheet() {
  sheet.classList.add('show');
  document.body.classList.add('sheet-open');
  if (typeof closeDropdown === 'function') closeDropdown();
  stopRotation(); // freeze the question while the user is answering
  setTimeout(() => sheetInput.focus(), 350);
}
function closeSheet() {
  sheet.classList.remove('show');
  document.body.classList.remove('sheet-open');
  if (pendingMarker) { pendingMarker.remove(); pendingMarker = null; }
  pendingLngLat = null;
  pendingQuestion = null;
  sheetInput.value = '';
  updateCount();
  sheetLoc.textContent = '(click map)';
  sheetLoc.classList.add('is-prompt');
  sheetCoords.textContent = '';
  startRotation(); // resume rotation when the sheet closes
}

map.on('click', (e) => {
  // Close any expanded answer-marker when clicking the map background
  answerMarkers.forEach(m => m.el.classList.remove('is-open'));
  // Lock in the current question when a click happens
  pendingQuestion = questionEl.textContent;
  if (sheetQText) sheetQText.textContent = pendingQuestion;
  pendingLngLat = [e.lngLat.lng, e.lngLat.lat];

  // Drop / move the temporary pending pin
  if (pendingMarker) pendingMarker.remove();
  const pendingEl = document.createElement('div');
  pendingEl.className = 'pending-pin';
  // Victorian-style pointing hand — fingertip is at SVG (10, 38), which is the marker's anchor point
  pendingEl.innerHTML = `
    <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
      <g fill="#fff" stroke="#1a1a1a" stroke-width="1" stroke-linejoin="round" stroke-linecap="round">
        <!-- Cuff (sleeve, top-right) -->
        <path d="M 30 4 L 46 8 L 46 16 L 30 12 Z" />
        <line x1="32" y1="6" x2="46" y2="9.5" stroke-width="0.6" />
        <line x1="32" y1="11" x2="46" y2="14.5" stroke-width="0.6" />
        <!-- Cuff button -->
        <circle cx="42" cy="11" r="1" fill="#1a1a1a" stroke="none" />
        <!-- Back of hand -->
        <path d="M 30 4 L 30 12 L 26 13 Q 22 14 20 17 L 18 21 Q 18 24 22 25 L 28 25 L 32 25 L 36 25 Q 40 24 40 20 L 40 10 Q 40 6 36 5 Z" />
        <!-- Index finger pointing down-left toward (10, 38) -->
        <path d="M 26 13 Q 22 16 18 22 L 14 30 Q 12 34 10 38 L 13 38 Q 16 35 20 30 L 24 24 Q 27 20 27 16 Q 27 13 26 13 Z" />
        <!-- Fingernail at fingertip (10, 38) -->
        <path d="M 10.5 36.5 Q 12 36.8 13 37 L 12.5 38 Q 11 38.2 10 38 Z" fill="#1a1a1a" stroke-width="0.5" />
        <!-- Curled middle finger -->
        <path d="M 27 16 Q 31 17 32 21 Q 32 24 30 25 Q 27 25 26 23" stroke-width="0.9" />
        <!-- Curled ring finger -->
        <path d="M 30 18 Q 34 19 35 22 Q 35 24 32 25 Q 30 25 29 24" stroke-width="0.9" />
        <!-- Curled pinky -->
        <path d="M 33 20 Q 36 21 36 23 Q 36 25 34 25 Q 32 25 32 24" stroke-width="0.9" />
        <!-- Thumb tucked at base -->
        <path d="M 24 24 Q 26 26 30 26 Q 28 28 24 27 Z" stroke-width="0.8" />
        <!-- Knuckle shading lines -->
        <path d="M 22 17 Q 21 19 20 21" fill="none" stroke-width="0.4" />
        <path d="M 25 19 Q 23 21 22 23" fill="none" stroke-width="0.4" />
        <!-- Finger crease -->
        <path d="M 18 24 Q 19 25 21 25" fill="none" stroke-width="0.4" />
      </g>
    </svg>
  `;
  // Anchor the SVG at the fingertip — viewBox is 48x48, fingertip is at (10, 38),
  // so as a fraction: x=10/48, y=38/48. MapLibre's offset is in pixels from the
  // anchor 'center' point, so we shift the element so that (10, 38) lands on the click.
  // Element is 48px tall × 48px wide; center is (24, 24). Fingertip offset from center
  // is (10-24, 38-24) = (-14, +14). To place fingertip on click, shift element by -(-14, +14) = (+14, -14).
  pendingMarker = new maplibregl.Marker({
    element: pendingEl,
    anchor: 'center',
    offset: [14, -14]
  })
    .setLngLat(pendingLngLat)
    .addTo(map);

  // Update catalog-card header — coords on the left (catalog code), neighborhood on the right (subject heading)
  const name = nearestNeighborhood(pendingLngLat);
  sheetLoc.textContent = name;
  sheetLoc.classList.remove('is-prompt');
  sheetCoords.textContent = `${pendingLngLat[1].toFixed(4)}° N · ${Math.abs(pendingLngLat[0]).toFixed(4)}° W`;

  // Open the answer sheet automatically (replaces the old + button flow)
  if (!sheet.classList.contains('show')) openSheet();
});

function submitAnswer() {
  const text = sheetInput.value.trim();
  if (!text) {
    sheetInput.focus();
    return;
  }
  if (!pendingLngLat) {
    // Flash a hint that they need to click the map
    sheetCoords.textContent = '← click the map first';
    sheetCoords.style.color = '#1a1a1a';
    setTimeout(() => { sheetCoords.textContent = ''; sheetCoords.style.color = ''; }, 1800);
    return;
  }
  saveAnswer({ lngLat: pendingLngLat, question: pendingQuestion, text });
  placeAnswerMarker({ lngLat: pendingLngLat, question: pendingQuestion, text });
  closeSheet();
}

sheetSubmit.addEventListener('click', submitAnswer);
sheetCancel.addEventListener('click', closeSheet);
sheetInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    submitAnswer();
  } else if (e.key === 'Escape') closeSheet();
});

// ─────────── STORAGE ───────────
const STORAGE_KEY = 'sf-mood-answers';
function saveAnswer(entry) {
  const all = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  all.push({ ...entry, timestamp: Date.now() });
  localStorage.setItem(STORAGE_KEY, JSON.stringify(all));
  updatePinCount();
}
function loadSavedAnswers() {
  const all = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  all.forEach(placeAnswerMarker);
  updatePinCount();
}
function updatePinCount() {
  const all = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  const el = document.getElementById('footer-pins');
  if (el) el.textContent = all.length.toLocaleString();
}

// ─────────── MARKER ───────────
// Track every answer marker element + its question, so we can highlight/dim them as the question rotates
const answerMarkers = [];
function placeAnswerMarker({ lngLat, question, text }) {
  const wrap = document.createElement('div');
  wrap.className = 'answer-marker';
  wrap.dataset.question = question;
  wrap.innerHTML = `
    <div class="answer-note">
      <div class="q">${escapeHtml(question)}</div>
      <div>${escapeHtml(text)}</div>
    </div>
  `;
  // Click the bookmark to expand the bar and reveal the answer text.
  // Only one marker open at a time — opening this one closes any other.
  wrap.addEventListener('click', (e) => {
    e.stopPropagation();
    const wasOpen = wrap.classList.contains('is-open');
    answerMarkers.forEach(m => m.el.classList.remove('is-open'));
    if (!wasOpen) wrap.classList.add('is-open');
  });
  new maplibregl.Marker({ element: wrap, anchor: 'top-left' })
    .setLngLat(lngLat)
    .addTo(map);
  answerMarkers.push({ el: wrap, question });
  applySpotlight();
}

// ─────────── LANDMARK RECALL ───────────
const LANDMARKS = [
  {
    name: 'Cliff House',
    date: '1863 — engraving from 1876',
    lng: -122.5135,
    lat: 37.7783,
    image: 'assets/cliff-house-1876.jpg',
    flyZoom: 14.5,
  },
];
const landmarkBtn = document.getElementById('landmark-btn');
const landmarkCard = document.getElementById('landmark-card');
const landmarkCardImage = document.getElementById('landmark-card-image');
const landmarkCardName = document.getElementById('landmark-card-name');
const landmarkCardDate = document.getElementById('landmark-card-date');
let landmarkCardTimer = null;

function showLandmark(idx) {
  const lm = LANDMARKS[idx];
  if (!lm) return;
  landmarkCardImage.src = lm.image;
  landmarkCardName.textContent = lm.name;
  landmarkCardDate.textContent = lm.date;
  landmarkCard.classList.add('show');
  landmarkCard.setAttribute('aria-hidden', 'false');
  if (landmarkCardTimer) clearTimeout(landmarkCardTimer);
  landmarkCardTimer = setTimeout(closeLandmark, 6000);
}
function closeLandmark() {
  landmarkCard.classList.remove('show');
  landmarkCard.setAttribute('aria-hidden', 'true');
  if (landmarkCardTimer) { clearTimeout(landmarkCardTimer); landmarkCardTimer = null; }
}
landmarkBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  showLandmark(0);
});
document.addEventListener('click', (e) => {
  if (!landmarkCard.classList.contains('show')) return;
  if (!e.target.closest('#landmark-card') && !e.target.closest('#landmark-btn')) closeLandmark();
});

// ─────────── REVEAL TOGGLE ───────────
const eyeToggle = document.getElementById('eye-toggle');
let revealed = false; // start in idle: pins hidden, map clear
const DEFAULT_VIEW = { center: [-122.4194, 37.7749], zoom: 12.5, pitch: 48, bearing: -16 };
const EYE_VIEW     = { center: [-122.4394, 37.7720], zoom: 11.4, pitch: 0,  bearing: 0 };
function setRevealed(on) {
  revealed = on;
  document.body.classList.toggle('spotlight-on', on);
  eyeToggle.classList.toggle('active', on);
  if (on && typeof closeDropdown === 'function') closeDropdown();
  requestAnimationFrame(() => map.resize());
  map.flyTo({ ...(on ? EYE_VIEW : DEFAULT_VIEW), duration: 1200, essential: true });
  applySpotlight();
}
eyeToggle.addEventListener('click', () => setRevealed(!revealed));

// Apply the spotlight effect: only when revealed; otherwise pins stay hidden via CSS
function applySpotlight() {
  if (!revealed) return;
  const currentQ = QUESTIONS[currentQuestionIndex];
  answerMarkers.forEach(m => {
    m.el.classList.toggle('dim', m.question !== currentQ);
  });
}
function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}
</script>
