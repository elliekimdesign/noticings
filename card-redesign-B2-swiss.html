<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>B2 · Swiss (refined) — card redesign</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #faf7ee;
      color: #1a1a1a;
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
    }
    .back {
      position: fixed; top: 24px; left: 32px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
      color: #1a1a1a; text-decoration: none; opacity: 0.55;
    }
    .back:hover { opacity: 1; }
    .stage {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 80px 32px;
    }
    .rail {
      width: 400px;
      border: 1.5px solid #666;
      background: #faf7ee;
    }

    /* ── B2 · Swiss refined ──
       Same composition as A2 (vertical "Assignment" left + 88px number),
       but everything in Inter sans — number is heavy 800,
       question is bold 700 ── */
    .card {
      padding: 28px 28px 32px;
      border-bottom: 1.5px solid #666;
    }
    .card .header {
      display: flex;
      align-items: flex-end;
      gap: 14px;
      margin-bottom: 20px;
    }
    .card .header .lbl {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(26,26,26,0.6);
      writing-mode: vertical-rl;
      transform: rotate(180deg);
      align-self: stretch;
      padding: 4px 0;
    }
    .card .header .num {
      font-family: 'Inter', sans-serif;
      font-weight: 800;
      font-size: 88px;
      line-height: 0.85;
      letter-spacing: -0.05em;
      color: #1a1a1a;
    }
    .card .q {
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      font-size: 26px;
      line-height: 1.1;
      letter-spacing: -0.025em;
      color: #1a1a1a;
    }

    /* ── Past rows ── */
    .row {
      padding: 16px 28px;
      border-bottom: 1.5px solid #666;
      display: grid;
      grid-template-columns: 36px 1fr;
      gap: 14px;
      align-items: baseline;
    }
    .row:last-child { border-bottom: none; }
    .row .num {
      font-family: 'Inter', sans-serif;
      font-weight: 800;
      font-size: 16px;
      letter-spacing: -0.03em;
      color: #1a1a1a;
    }
    .row .q {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(26,26,26,0.6);
      line-height: 1.5;
    }
  </style>
</head>
<body>

<a class="back" href="card-redesign-INDEX.html">← all designs</a>

<div class="stage">
  <div class="rail">

    <div class="card">
      <div class="header">
        <div class="lbl">Assignment</div>
        <div class="num">01</div>
      </div>
      <div class="q">I keep coming back to…</div>
    </div>

    <div class="row">
      <div class="num">02</div>
      <div class="q">The thing I miss most is…</div>
    </div>

    <div class="row">
      <div class="num">03</div>
      <div class="q">A street I walk on Sundays</div>
    </div>

  </div>
</div>

</body>
</html>
