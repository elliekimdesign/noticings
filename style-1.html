<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SF — Architectural Plan</title>
  <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100vw; height: 100vh; overflow: hidden; background: #fafafa; }
    #map { width: 100vw; height: 100vh; }
    .maplibregl-ctrl-logo, .maplibregl-ctrl-attrib, .maplibregl-ctrl-group { display: none !important; }
    #ctrl {
      position: fixed; bottom: 24px; right: 24px; z-index: 300;
      display: flex; flex-direction: column; gap: 2px;
      opacity: 0.12; transition: opacity 0.3s;
    }
    #ctrl:hover { opacity: 1; }
    #ctrl button {
      width: 28px; height: 28px; background: rgba(255,255,255,0.9);
      border: 1px solid #ddd; border-radius: 0; font-size: 14px;
      color: #555; cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    #ctrl button:hover { background: #fff; }
    #ctrl .s { height: 5px; }
  </style>
</head>
<body>
<div id="ctrl">
  <button id="zi">+</button><button id="zo">−</button>
  <div class="s"></div>
  <button id="tl">⊹</button><button id="nr">↑</button>
</div>
<div id="map"></div>
<script>
const map = new maplibregl.Map({
  container: 'map',
  style: 'https://tiles.openfreemap.org/styles/liberty',
  center: [-122.4194, 37.7749],
  zoom: 13.5, pitch: 0, bearing: 0,
  maxBounds: [[-122.562, 37.639],[-122.327, 37.930]],
  minZoom: 11, maxZoom: 20, attributionControl: false,
});
document.getElementById('zi').onclick = () => map.zoomIn({ duration: 400 });
document.getElementById('zo').onclick = () => map.zoomOut({ duration: 400 });
document.getElementById('nr').onclick = () => map.easeTo({ bearing: 0, pitch: 0, duration: 700 });
document.getElementById('tl').onclick = () => map.easeTo({ pitch: map.getPitch() > 10 ? 0 : 48, duration: 700 });

map.on('style.load', () => {
  const layers = map.getStyle().layers;
  for (const { id, type } of layers) {
    try {
      if (type === 'symbol' || type === 'fill-extrusion') { map.removeLayer(id); continue; }
      if (id === 'background') { map.setPaintProperty(id, 'background-color', '#fafafa'); continue; }
      // Water — pure white, same as land. No distinction.
      if (/water|ocean|sea|bay|lake|river/.test(id)) {
        if (type === 'fill') { map.setPaintProperty(id, 'fill-color', '#fafafa'); map.setPaintProperty(id, 'fill-opacity', 1); }
        if (type === 'line') map.setPaintProperty(id, 'line-opacity', 0);
        continue;
      }
      // All land — flat white
      if (type === 'fill') { map.setPaintProperty(id, 'fill-color', '#fafafa'); map.setPaintProperty(id, 'fill-opacity', 1); }
      if (type === 'line') map.setPaintProperty(id, 'line-opacity', 0);
    } catch(_) {}
  }

  // Buildings as solid dark blocks — density is the map
  map.addLayer({
    id: 'building-fill',
    type: 'fill',
    source: 'openmaptiles',
    'source-layer': 'building',
    paint: {
      'fill-color': [
        'interpolate', ['linear'],
        ['coalesce', ['get', 'render_height'], 6],
        0,  '#e0e0e0',
        6,  '#d0d0d0',
        15, '#bebebe',
        30, '#aaaaaa',
        60, '#969696',
        120,'#828282',
        250,'#6e6e6e',
      ],
      'fill-opacity': 1,
    }
  });

  // Crisp single-pixel outline — each block reads as a precise unit
  map.addLayer({
    id: 'building-outline',
    type: 'line',
    source: 'openmaptiles',
    'source-layer': 'building',
    paint: {
      'line-color': '#fafafa',
      'line-width': 0.8,
      'line-opacity': 1,
    }
  });

  // Water outline — just the coastline as a single fine line
  map.addLayer({
    id: 'coast-line',
    type: 'line',
    source: 'openmaptiles',
    'source-layer': 'water',
    paint: {
      'line-color': '#cccccc',
      'line-width': 0.6,
      'line-opacity': 0.8,
    }
  });
});
</script>
</body>
</html>
