<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>H · Index card / typewriter — card redesign</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #faf7ee;
      color: #1a1a1a;
      min-height: 100vh;
      font-family: 'JetBrains Mono', monospace;
    }
    .back {
      position: fixed; top: 24px; left: 32px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
      color: #1a1a1a; text-decoration: none; opacity: 0.55;
    }
    .back:hover { opacity: 1; }
    .stage {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 80px 32px;
    }
    .rail {
      width: 400px;
      border: 1.5px solid #666;
      background: #faf7ee;
    }

    /* ── H · Typewriter index card ──
       The active card looks like a 3x5 from a writer's notebook.
       Pale ruled horizontal lines run across the body. The label is
       typed in the upper corner. The question is typed across the
       lines in JetBrains Mono regular — slightly bigger than label.
       A small punched circle in the upper-left edge for the binding. */
    .indexcard {
      position: relative;
      padding: 24px 26px 30px 50px;
      border-bottom: 1.5px solid #666;
      /* Pale horizontal rules across the body */
      background-image: repeating-linear-gradient(
        to bottom,
        transparent 0,
        transparent 23px,
        rgba(26,26,26,0.18) 23px,
        rgba(26,26,26,0.18) 24px
      );
      background-position: 0 36px;
      background-repeat: repeat;
    }

    /* Punched binding hole */
    .indexcard .hole {
      position: absolute;
      top: 30px;
      left: 16px;
      width: 12px;
      height: 12px;
      border: 1px solid rgba(26,26,26,0.45);
      border-radius: 50%;
      background: #faf7ee;
    }

    /* Top label — typewritten metadata */
    .indexcard .head {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(26,26,26,0.65);
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 1.5px solid #1a1a1a;
    }

    /* The question — typed across the ruled lines */
    .indexcard .q {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 400;
      font-size: 17px;
      line-height: 24px;
      color: #1a1a1a;
      letter-spacing: 0;
    }

    /* Past index cards — compact, still typed, no rules */
    .row {
      padding: 14px 26px 14px 50px;
      border-bottom: 1.5px solid #666;
      position: relative;
    }
    .row:last-child { border-bottom: none; }
    .row .hole {
      position: absolute;
      top: 18px;
      left: 16px;
      width: 8px;
      height: 8px;
      border: 1px solid rgba(26,26,26,0.45);
      border-radius: 50%;
      background: #faf7ee;
    }
    .row .head {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(26,26,26,0.55);
      margin-bottom: 4px;
    }
    .row .q {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.04em;
      color: rgba(26,26,26,0.75);
      line-height: 1.45;
    }
  </style>
</head>
<body>

<a class="back" href="card-redesign-INDEX.html">← all designs</a>

<div class="stage">
  <div class="rail">

    <div class="indexcard">
      <div class="hole"></div>
      <div class="head">Card #01 · May 1, 2026</div>
      <div class="q">I keep coming back to…</div>
    </div>

    <div class="row">
      <div class="hole"></div>
      <div class="head">Card #02 · Apr 17</div>
      <div class="q">The thing I miss most is…</div>
    </div>

    <div class="row">
      <div class="hole"></div>
      <div class="head">Card #03 · Apr 03</div>
      <div class="q">A street I walk on Sundays</div>
    </div>

  </div>
</div>

</body>
</html>
