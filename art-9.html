<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>San Francisco</title>
  <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100vw; height: 100vh; overflow: hidden; background: #f5f5f5; }
    #map { width: 100vw; height: 100vh; }
    .maplibregl-ctrl-logo, .maplibregl-ctrl-attrib, .maplibregl-ctrl-group { display: none !important; }
    #ctrl {
      position: fixed; bottom: 24px; right: 24px; z-index: 300;
      display: flex; flex-direction: column; gap: 2px;
      opacity: 0.12; transition: opacity 0.3s;
    }
    #ctrl:hover { opacity: 1; }
    #ctrl button {
      width: 28px; height: 28px; background: rgba(255,255,255,0.9);
      border: 1px solid #d8d8d8; border-radius: 0; font-size: 14px;
      color: #555; cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    #ctrl button:hover { background: #fff; }
    #ctrl .s { height: 5px; }
  </style>
</head>
<body>
<div id="ctrl">
  <button id="zi">+</button><button id="zo">−</button>
  <div class="s"></div>
  <button id="tl">⊹</button><button id="nr">↑</button>
</div>
<div id="map"></div>
<script>
const map = new maplibregl.Map({
  container: 'map',
  style: 'https://tiles.openfreemap.org/styles/liberty',
  center: [-122.4194, 37.7749],
  zoom: 12.5, pitch: 48, bearing: -16,
  maxBounds: [[-122.562, 37.639],[-122.327, 37.930]],
  minZoom: 11, maxZoom: 20, attributionControl: false,
});
document.getElementById('zi').onclick = () => map.zoomIn({ duration: 400 });
document.getElementById('zo').onclick = () => map.zoomOut({ duration: 400 });
document.getElementById('nr').onclick = () => map.easeTo({ bearing: 0, pitch: 0, duration: 700 });
document.getElementById('tl').onclick = () => map.easeTo({ pitch: map.getPitch() > 10 ? 0 : 48, duration: 700 });

map.on('style.load', () => {
  const layers = map.getStyle().layers;

  for (const { id, type } of layers) {
    try {
      if (type === 'symbol' || type === 'fill-extrusion') { map.removeLayer(id); continue; }

      if (id === 'background') { map.setPaintProperty(id, 'background-color', '#f5f5f5'); continue; }

      // Water — clean light grey, just enough to read the bay edge
      if (/water|ocean|sea|bay|lake|river/.test(id)) {
        if (type === 'fill') { map.setPaintProperty(id, 'fill-color', '#e2e2e2'); map.setPaintProperty(id, 'fill-opacity', 1); }
        if (type === 'line') map.setPaintProperty(id, 'line-opacity', 0);
        continue;
      }

      // Parks/land — same as background, no distinction
      if (/park|grass|wood|forest|nature|garden|cemetery|scrub|meadow|farmland|landuse|landcover|land-|earth|sand|beach/.test(id)) {
        if (type === 'fill') { map.setPaintProperty(id, 'fill-color', '#f5f5f5'); map.setPaintProperty(id, 'fill-opacity', 1); }
        if (type === 'line') map.setPaintProperty(id, 'line-opacity', 0);
        continue;
      }

      // Roads — all quiet, barely there, pure grey
      if (/motorway|trunk/.test(id)) {
        if (type === 'line') {
          map.setPaintProperty(id, 'line-color', '#aaa');
          map.setPaintProperty(id, 'line-opacity', 0.45);
          try { map.setPaintProperty(id, 'line-width',
            ['interpolate',['linear'],['zoom'], 10,0.5, 12,0.9, 14,1.4, 17,2.2]); } catch(_){}
        }
        if (type === 'fill') map.setPaintProperty(id, 'fill-opacity', 0);
        continue;
      }
      if (/primary|secondary/.test(id)) {
        if (type === 'line') {
          map.setPaintProperty(id, 'line-color', '#aaa');
          map.setPaintProperty(id, 'line-opacity', 0.35);
          try { map.setPaintProperty(id, 'line-width',
            ['interpolate',['linear'],['zoom'], 10,0.3, 12,0.6, 14,0.9, 17,1.5]); } catch(_){}
        }
        if (type === 'fill') map.setPaintProperty(id, 'fill-opacity', 0);
        continue;
      }
      if (/road|street|tertiary|minor|service/.test(id)) {
        if (type === 'line') {
          map.setPaintProperty(id, 'line-color', '#bbb');
          map.setPaintProperty(id, 'line-opacity', 0.25);
          try { map.setPaintProperty(id, 'line-width',
            ['interpolate',['linear'],['zoom'], 12,0.15, 14,0.3, 17,0.7]); } catch(_){}
        }
        if (type === 'fill') map.setPaintProperty(id, 'fill-opacity', 0);
        continue;
      }
      if (/path|footway|cycleway|pedestrian|rail|transit/.test(id)) {
        if (type === 'line') map.setPaintProperty(id, 'line-opacity', 0);
        continue;
      }

      // Building footprints
      if (/building/.test(id) && type === 'fill') {
        map.setPaintProperty(id, 'fill-color', '#ebebeb');
        map.setPaintProperty(id, 'fill-opacity', 1);
        map.setPaintProperty(id, 'fill-outline-color', '#d8d8d8');
        continue;
      }

      if (type === 'fill') { map.setPaintProperty(id, 'fill-color', '#f5f5f5'); map.setPaintProperty(id, 'fill-opacity', 1); }
      if (type === 'line') map.setPaintProperty(id, 'line-opacity', 0);
    } catch(_) {}
  }

  try {
    // Contour minor — hairline thin, barely there
    map.addLayer({
      id: 'contour-minor',
      type: 'line',
      source: 'openmaptiles',
      'source-layer': 'contour',
      filter: ['!=', ['%', ['get', 'ele'], 100], 0],
      paint: {
        'line-color': '#cccccc',
        'line-width': ['interpolate',['linear'],['zoom'], 11,0.2, 14,0.4],
        'line-opacity': ['interpolate',['linear'],['zoom'], 11,0.3, 14,0.55, 16,0.2],
      }
    });

    // Contour major — clean, precise, darker with elevation
    map.addLayer({
      id: 'contour-major',
      type: 'line',
      source: 'openmaptiles',
      'source-layer': 'contour',
      filter: ['==', ['%', ['get', 'ele'], 100], 0],
      paint: {
        'line-color': ['interpolate',['linear'],['get','ele'], 0,'#bbbbbb', 100,'#999999', 200,'#717171', 300,'#484848'],
        'line-width': ['interpolate',['linear'],['zoom'], 11,0.7, 13,1.3, 15,1.8],
        'line-opacity': ['interpolate',['linear'],['zoom'], 11,0.6, 13,0.85, 16,0.3],
      }
    });
  } catch(_) {}

  // Building hairlines at zoom 14+ — crisp single pixel
  map.addLayer({
    id: 'building-ink',
    type: 'line',
    source: 'openmaptiles',
    'source-layer': 'building',
    minzoom: 14,
    paint: { 'line-color': '#d2d2d2', 'line-width': 0.5, 'line-opacity': 0.7 }
  });

  // 3D buildings — pure grey, clean gradient
  map.addLayer({
    id: 'buildings-3d',
    type: 'fill-extrusion',
    source: 'openmaptiles',
    'source-layer': 'building',
    minzoom: 13,
    paint: {
      'fill-extrusion-height': [
        'interpolate', ['linear'], ['zoom'],
        13, 0,
        14, ['coalesce', ['get', 'render_height'], ['*', ['coalesce', ['get', 'building_levels'], 2], 3.5]]
      ],
      'fill-extrusion-base': ['coalesce', ['get', 'render_min_height'], 0],
      'fill-extrusion-color': [
        'interpolate', ['linear'],
        ['coalesce', ['get', 'render_height'], 6],
        0,   '#ececec',
        8,   '#e4e4e4',
        20,  '#d8d8d8',
        45,  '#cacaca',
        90,  '#bbbbbb',
        160, '#adadad',
        300, '#9e9e9e'
      ],
      'fill-extrusion-opacity': 1,
      'fill-extrusion-ambient-occlusion-intensity': 0.4,
      'fill-extrusion-ambient-occlusion-radius': 3,
    }
  });
});
</script>
</body>
</html>
