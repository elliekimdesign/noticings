<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>D3 · Editorial italic — card redesign</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #faf7ee;
      color: #1a1a1a;
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
    }
    .back {
      position: fixed; top: 24px; left: 32px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
      color: #1a1a1a; text-decoration: none; opacity: 0.55;
    }
    .back:hover { opacity: 1; }
    .stage {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 80px 32px;
    }
    .rail {
      width: 400px;
      border: 1.5px solid #666;
      background: #faf7ee;
    }

    /* ── D3 · Editorial italic ──
       DM Serif Display ITALIC — gives the number movement and editorial flair.
       Composition: number top-LEFT (against the convention), with a horizontal
       hairline cutting across the card mid-height. Question lives in the
       lower half — gridded and quiet against the loud italic numeral. */
    .card {
      position: relative;
      padding: 28px 28px 32px;
      border-bottom: 1.5px solid #666;
      min-height: 260px;
      overflow: hidden;
    }
    .card .lbl {
      position: absolute;
      top: 28px;
      right: 18px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(26,26,26,0.6);
      writing-mode: vertical-rl;
    }
    .card .num {
      font-family: 'DM Serif Display', serif;
      font-style: italic;
      font-size: 142px;
      line-height: 0.85;
      letter-spacing: -0.04em;
      color: #1a1a1a;
      margin-bottom: 14px;
      margin-left: -6px;
    }
    .card .rule {
      width: 100%;
      height: 1px;
      background: #1a1a1a;
      margin: 8px 0 18px;
    }
    .card .q {
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      font-size: 22px;
      line-height: 1.15;
      letter-spacing: -0.02em;
      color: #1a1a1a;
      max-width: 80%;
    }

    /* ── Past rows ── */
    .row {
      padding: 16px 28px;
      border-bottom: 1.5px solid #666;
      display: grid;
      grid-template-columns: 36px 1fr;
      gap: 14px;
      align-items: baseline;
    }
    .row:last-child { border-bottom: none; }
    .row .num {
      font-family: 'DM Serif Display', serif;
      font-style: italic;
      font-size: 24px;
      line-height: 1;
      color: #1a1a1a;
    }
    .row .q {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(26,26,26,0.6);
      line-height: 1.5;
    }
  </style>
</head>
<body>

<a class="back" href="card-redesign-INDEX.html">← all designs</a>

<div class="stage">
  <div class="rail">

    <div class="card">
      <div class="lbl">Assignment</div>
      <div class="num">01</div>
      <div class="rule"></div>
      <div class="q">I keep coming back to…</div>
    </div>

    <div class="row">
      <div class="num">02</div>
      <div class="q">The thing I miss most is…</div>
    </div>

    <div class="row">
      <div class="num">03</div>
      <div class="q">A street I walk on Sundays</div>
    </div>

  </div>
</div>

</body>
</html>
