<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>C · Ticket — card redesign</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=Gilda+Display&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #faf7ee;
      color: #1a1a1a;
      min-height: 100vh;
      font-family: 'JetBrains Mono', monospace;
    }
    .back {
      position: fixed; top: 24px; left: 32px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
      color: #1a1a1a; text-decoration: none; opacity: 0.55;
    }
    .back:hover { opacity: 1; }
    .stage {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 80px 32px;
    }
    .rail {
      width: 400px;
      border: 1.5px solid #666;
      background: #faf7ee;
    }

    /* ── C · Library card ── */
    .card {
      padding: 22px 28px 26px;
      border-bottom: 1.5px solid #666;
    }
    .card .meta {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(26,26,26,0.6);
      padding-bottom: 12px;
      border-bottom: 1.5px dashed #999;
      margin-bottom: 18px;
    }
    .card .num {
      font-family: 'Gilda Display', 'Cormorant Garamond', serif;
      font-size: 64px;
      line-height: 1;
      color: #1a1a1a;
      margin-bottom: 10px;
    }
    .card .q {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 500;
      font-size: 28px;
      line-height: 1.2;
      color: #1a1a1a;
      margin-top: 4px;
    }
    .card .stamp {
      margin-top: 22px;
      padding-top: 12px;
      border-top: 1.5px dashed #999;
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(26,26,26,0.6);
      display: flex;
      justify-content: space-between;
    }

    /* ── Past rows ── */
    .row {
      padding: 14px 28px;
      border-bottom: 1.5px solid #666;
      display: grid;
      grid-template-columns: 44px 1fr;
      gap: 14px;
      align-items: baseline;
    }
    .row:last-child { border-bottom: none; }
    .row .num {
      font-family: 'Gilda Display', serif;
      font-size: 22px;
      line-height: 1;
      color: #1a1a1a;
    }
    .row .q {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 14px;
      color: rgba(26,26,26,0.7);
      line-height: 1.4;
    }
  </style>
</head>
<body>

<a class="back" href="card-redesign-INDEX.html">← all designs</a>

<div class="stage">
  <div class="rail">

    <div class="card">
      <div class="meta">
        <span>Assignment</span>
        <span>Apr 15 → Apr 29</span>
      </div>
      <div class="num">01</div>
      <div class="q">I keep coming back to…</div>
      <div class="stamp">
        <span>San Francisco</span>
        <span>02 pinned</span>
      </div>
    </div>

    <div class="row">
      <div class="num">02</div>
      <div class="q">The thing I miss most is…</div>
    </div>

    <div class="row">
      <div class="num">03</div>
      <div class="q">A street I walk on Sundays</div>
    </div>

  </div>
</div>

</body>
</html>
