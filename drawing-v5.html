<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>San Francisco</title>
  <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100vw; height: 100vh; overflow: hidden; background: #f7f7f5; }
    #map { width: 100vw; height: 100vh; }
    .maplibregl-ctrl-logo, .maplibregl-ctrl-attrib, .maplibregl-ctrl-group { display: none !important; }
    #ctrl {
      position: fixed; bottom: 24px; right: 24px; z-index: 300;
      display: flex; flex-direction: column; gap: 2px;
      opacity: 0.1; transition: opacity 0.3s;
    }
    #ctrl:hover { opacity: 1; }
    #ctrl button {
      width: 28px; height: 28px; background: rgba(255,255,255,0.9);
      border: 1px solid #ccc; border-radius: 0; font-size: 14px;
      color: #555; cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    #ctrl button:hover { background: #fff; }
    #ctrl .s { height: 5px; }
  </style>
</head>
<body>
<div id="ctrl">
  <button id="zi">+</button><button id="zo">−</button>
  <div class="s"></div>
  <button id="tl">⊹</button><button id="nr">↑</button>
</div>
<div id="map"></div>
<script>
const map = new maplibregl.Map({
  container: 'map',
  style: 'https://tiles.openfreemap.org/styles/liberty',
  // Shifted center slightly west toward the hills — Twin Peaks in frame
  center: [-122.4350, 37.7680],
  zoom: 12.8, pitch: 52, bearing: -28,
  maxBounds: [[-122.562, 37.639],[-122.327, 37.930]],
  minZoom: 11, maxZoom: 20, attributionControl: false,
});
document.getElementById('zi').onclick = () => map.zoomIn({ duration: 400 });
document.getElementById('zo').onclick = () => map.zoomOut({ duration: 400 });
document.getElementById('nr').onclick = () => map.easeTo({ bearing: 0, pitch: 0, duration: 700 });
document.getElementById('tl').onclick = () => map.easeTo({ pitch: map.getPitch() > 10 ? 0 : 52, bearing: map.getPitch() > 10 ? 0 : -28, duration: 700 });

map.on('style.load', () => {
  const layers = map.getStyle().layers;

  for (const { id, type } of layers) {
    try {
      if (type === 'symbol' || type === 'fill-extrusion') { map.removeLayer(id); continue; }
      if (id === 'background') { map.setPaintProperty(id, 'background-color', '#f7f7f5'); continue; }

      // Water — slightly darker than land, defines the bay shape
      if (/water|ocean|sea|bay|lake|river/.test(id)) {
        if (type === 'fill') { map.setPaintProperty(id, 'fill-color', '#e8e8e5'); map.setPaintProperty(id, 'fill-opacity', 1); }
        if (type === 'line') map.setPaintProperty(id, 'line-opacity', 0);
        continue;
      }

      // All land — same paper tone
      if (/park|grass|wood|forest|nature|garden|cemetery|scrub|meadow|landuse|landcover|land-|earth|sand|beach/.test(id)) {
        if (type === 'fill') { map.setPaintProperty(id, 'fill-color', '#f7f7f5'); map.setPaintProperty(id, 'fill-opacity', 1); }
        if (type === 'line') map.setPaintProperty(id, 'line-opacity', 0);
        continue;
      }

      // Roads — completely removed. Grid implied only by building gaps.
      if (/motorway|trunk|primary|secondary|road|street|tertiary|minor|service|path|footway|cycleway|pedestrian|rail|transit/.test(id)) {
        if (type === 'line') map.setPaintProperty(id, 'line-opacity', 0);
        if (type === 'fill') map.setPaintProperty(id, 'fill-opacity', 0);
        continue;
      }

      // Building footprints — solid grey, the urban fabric reads clearly
      if (/building/.test(id) && type === 'fill') {
        map.setPaintProperty(id, 'fill-color', '#d8d8d4');
        map.setPaintProperty(id, 'fill-opacity', 1);
        map.setPaintProperty(id, 'fill-outline-color', '#bbbbb8');
        continue;
      }

      if (type === 'fill') { map.setPaintProperty(id, 'fill-color', '#f7f7f5'); map.setPaintProperty(id, 'fill-opacity', 1); }
      if (type === 'line') map.setPaintProperty(id, 'line-opacity', 0);
    } catch(_) {}
  }

  // Minor contours — whisper thin, appear only zoomed in
  try {
    map.addLayer({
      id: 'contour-minor',
      type: 'line',
      source: 'openmaptiles',
      'source-layer': 'contour',
      filter: ['!=', ['%', ['get', 'ele'], 100], 0],
      paint: {
        'line-color': '#d0d0ce',
        'line-width': ['interpolate',['linear'],['zoom'], 11,0.2, 14,0.45, 17,0.6],
        'line-opacity': ['interpolate',['linear'],['zoom'], 11,0.35, 14,0.65, 16,0.2],
      }
    });

    // Major contours — the hills as the only bold mark on the whole map
    // They darken dramatically: low ground barely shows, peaks go near-black
    map.addLayer({
      id: 'contour-major',
      type: 'line',
      source: 'openmaptiles',
      'source-layer': 'contour',
      filter: ['==', ['%', ['get', 'ele'], 100], 0],
      paint: {
        'line-color': ['interpolate',['linear'],['get','ele'],
          0,   '#d8d8d6',
          50,  '#c0c0be',
          100, '#a0a09e',
          200, '#707070',
          300, '#383838',
        ],
        'line-width': ['interpolate',['linear'],['zoom'], 11,0.9, 13,1.6, 15,2.4, 17,3.0],
        'line-opacity': ['interpolate',['linear'],['zoom'], 11,0.7, 13,0.95, 16,0.4],
      }
    });
  } catch(_) {}

  // Building footprints rendered explicitly — visible at all zoom levels
  map.addLayer({
    id: 'building-fill-extra',
    type: 'fill',
    source: 'openmaptiles',
    'source-layer': 'building',
    paint: {
      'fill-color': '#d8d8d4',
      'fill-opacity': 0.95,
      'fill-outline-color': '#bbbbb8',
    }
  });
});
</script>
</body>
</html>
