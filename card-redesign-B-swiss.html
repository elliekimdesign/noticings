<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>B · Swiss — card redesign</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #faf7ee;
      color: #1a1a1a;
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
    }
    .back {
      position: fixed; top: 24px; left: 32px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
      color: #1a1a1a; text-decoration: none; opacity: 0.55;
    }
    .back:hover { opacity: 1; }
    .stage {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 80px 32px;
    }
    .rail {
      width: 400px;
      border: 1.5px solid #666;
      background: #faf7ee;
    }

    /* ── B · Swiss grid ── */
    .card {
      padding: 24px 28px 28px;
      border-bottom: 1.5px solid #666;
    }
    .card .header {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      padding-bottom: 16px;
      border-bottom: 1px solid rgba(26,26,26,0.18);
      margin-bottom: 18px;
    }
    .card .header .lbl {
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(26,26,26,0.6);
    }
    .card .header .lbl.right { text-align: right; }
    .card .num {
      font-family: 'Inter', sans-serif;
      font-weight: 800;
      font-size: 96px;
      line-height: 0.9;
      letter-spacing: -0.05em;
      color: #1a1a1a;
      margin-bottom: 12px;
    }
    .card .q {
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      font-size: 22px;
      line-height: 1.2;
      letter-spacing: -0.015em;
      color: #1a1a1a;
    }

    /* ── Past rows ── */
    .row {
      padding: 14px 28px;
      border-bottom: 1.5px solid #666;
      display: grid;
      grid-template-columns: 36px 1fr;
      gap: 14px;
      align-items: baseline;
    }
    .row:last-child { border-bottom: none; }
    .row .num {
      font-family: 'Inter', sans-serif;
      font-weight: 800;
      font-size: 16px;
      letter-spacing: -0.02em;
      color: #1a1a1a;
    }
    .row .q {
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0;
      text-transform: none;
      color: rgba(26,26,26,0.65);
      line-height: 1.5;
    }
  </style>
</head>
<body>

<a class="back" href="card-redesign-INDEX.html">← all designs</a>

<div class="stage">
  <div class="rail">

    <div class="card">
      <div class="header">
        <div class="lbl">Assignment</div>
        <div class="lbl right">Week 01</div>
      </div>
      <div class="num">01</div>
      <div class="q">I keep coming back to…</div>
    </div>

    <div class="row">
      <div class="num">02</div>
      <div class="q">The thing I miss most is…</div>
    </div>

    <div class="row">
      <div class="num">03</div>
      <div class="q">A street I walk on Sundays</div>
    </div>

  </div>
</div>

</body>
</html>
