<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SF — Contour Only</title>
  <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100vw; height: 100vh; overflow: hidden; background: #f7f6f2; }
    #map { width: 100vw; height: 100vh; }
    .maplibregl-ctrl-logo, .maplibregl-ctrl-attrib, .maplibregl-ctrl-group { display: none !important; }
    #ctrl {
      position: fixed; bottom: 24px; right: 24px; z-index: 300;
      display: flex; flex-direction: column; gap: 2px;
      opacity: 0.12; transition: opacity 0.3s;
    }
    #ctrl:hover { opacity: 1; }
    #ctrl button {
      width: 28px; height: 28px; background: rgba(255,255,255,0.9);
      border: 1px solid #ccc; border-radius: 0; font-size: 14px;
      color: #555; cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    #ctrl button:hover { background: #fff; }
    #ctrl .s { height: 5px; }
  </style>
</head>
<body>
<div id="ctrl">
  <button id="zi">+</button><button id="zo">−</button>
  <div class="s"></div>
  <button id="tl">⊹</button><button id="nr">↑</button>
</div>
<div id="map"></div>
<script>
const map = new maplibregl.Map({
  container: 'map',
  style: 'https://tiles.openfreemap.org/styles/liberty',
  center: [-122.4194, 37.7749],
  zoom: 12.5, pitch: 48, bearing: -16,
  maxBounds: [[-122.562, 37.639],[-122.327, 37.930]],
  minZoom: 11, maxZoom: 20, attributionControl: false,
});
document.getElementById('zi').onclick = () => map.zoomIn({ duration: 400 });
document.getElementById('zo').onclick = () => map.zoomOut({ duration: 400 });
document.getElementById('nr').onclick = () => map.easeTo({ bearing: 0, pitch: 0, duration: 700 });
document.getElementById('tl').onclick = () => map.easeTo({ pitch: map.getPitch() > 10 ? 0 : 48, duration: 700 });

map.on('style.load', () => {
  const layers = map.getStyle().layers;
  for (const { id, type } of layers) {
    try {
      if (type === 'symbol' || type === 'fill-extrusion') { map.removeLayer(id); continue; }
      // Everything becomes the same bare paper — roads, buildings, land, water all silent
      if (id === 'background') { map.setPaintProperty(id, 'background-color', '#f7f6f2'); continue; }
      if (/water|ocean|sea|bay|lake|river/.test(id)) {
        if (type === 'fill') { map.setPaintProperty(id, 'fill-color', '#eceae4'); map.setPaintProperty(id, 'fill-opacity', 1); }
        if (type === 'line') map.setPaintProperty(id, 'line-opacity', 0);
        continue;
      }
      if (type === 'fill') { map.setPaintProperty(id, 'fill-color', '#f7f6f2'); map.setPaintProperty(id, 'fill-opacity', 1); }
      if (type === 'line') map.setPaintProperty(id, 'line-opacity', 0);
    } catch(_) {}
  }

  // The only lines in the entire map: contours
  // Minor — very fine, like pencil dust
  map.addLayer({
    id: 'contour-minor',
    type: 'line',
    source: 'openmaptiles',
    'source-layer': 'contour',
    filter: ['!=', ['%', ['get', 'ele'], 100], 0],
    paint: {
      'line-color': '#c8c4bc',
      'line-width': ['interpolate',['linear'],['zoom'], 11,0.25, 14,0.5, 17,0.7],
      'line-opacity': ['interpolate',['linear'],['zoom'], 11,0.4, 14,0.7, 16,0.3],
    }
  });
  // Major — bolder, darken as elevation rises — hills read as graphic mass
  map.addLayer({
    id: 'contour-major',
    type: 'line',
    source: 'openmaptiles',
    'source-layer': 'contour',
    filter: ['==', ['%', ['get', 'ele'], 100], 0],
    paint: {
      'line-color': ['interpolate',['linear'],['get','ele'], 0,'#bbb', 50,'#aaa', 100,'#888', 200,'#666', 300,'#444'],
      'line-width': ['interpolate',['linear'],['zoom'], 11,0.9, 13,1.6, 15,2.2, 17,2.8],
      'line-opacity': ['interpolate',['linear'],['zoom'], 11,0.65, 13,0.9, 16,0.4],
    }
  });
});
</script>
</body>
</html>
