<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SF — Midnight Blueprint</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.osmbuildings.org/OSMBuildings-Leaflet.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #080e18; font-family: 'Inter', sans-serif; width: 100vw; height: 100vh; overflow: hidden; }
    #map { width: 100vw; height: 100vh; }

    /* Push tiles into deep indigo-navy territory */
    .leaflet-tile { filter: hue-rotate(195deg) saturate(0.55) brightness(0.78) contrast(1.1); }

    .leaflet-control-zoom { display: none; }
    .leaflet-control-attribution {
      font-family: 'Inter', sans-serif !important; font-size: 10px !important;
      font-weight: 300 !important; color: #3a4a5a !important;
      background: transparent !important; border: none !important; box-shadow: none !important;
    }
    .leaflet-control-attribution a { color: #3a4a5a !important; }
    .leaflet-control-scale-line {
      font-family: 'Inter', sans-serif !important; font-size: 10px !important;
      font-weight: 300 !important; color: #3a4a5a !important;
      border-color: #3a4a5a !important; border-bottom-width: 1px !important;
      background: transparent !important; box-shadow: none !important;
    }

    .leaflet-tooltip.nhood-label {
      background: transparent; border: none; box-shadow: none; padding: 0;
      font-family: 'Inter', sans-serif; font-size: 8.5px; font-weight: 300;
      letter-spacing: 0.22em; color: #8a7a5a; text-transform: uppercase;
      white-space: nowrap; pointer-events: none;
    }
    .leaflet-tooltip.nhood-label::before { display: none; }

    .leaflet-popup-content-wrapper {
      background: #0d1520 !important; border: 1px solid #1e2d40 !important;
      border-radius: 0 !important; box-shadow: 0 4px 24px rgba(0,0,0,0.5) !important;
      padding: 0 !important;
    }
    .leaflet-popup-content { margin: 0 !important; }
    .leaflet-popup-tip { background: #0d1520 !important; }
    .leaflet-popup-close-button { font-weight: 300 !important; font-size: 16px !important; color: #3a4a5a !important; top: 10px !important; right: 12px !important; }
    .popup-inner { padding: 22px 24px 18px; min-width: 200px; max-width: 240px; }
    .popup-inner .p-name { font-size: 13px; font-weight: 400; color: #c8b88a; letter-spacing: 0.06em; margin-bottom: 10px; }
    .popup-inner .p-note { font-size: 12px; font-weight: 300; color: #6a7a8a; line-height: 1.65; }
    .popup-inner .p-coords { font-size: 10px; font-weight: 300; color: #2a3a4a; margin-top: 12px; letter-spacing: 0.08em; }

    #title { position: fixed; top: 28px; left: 28px; z-index: 600; pointer-events: none; }
    #title h1 { font-size: 13px; font-weight: 300; color: #c8b88a; letter-spacing: 0.3em; text-transform: uppercase; }
    #title p { font-size: 9px; font-weight: 300; color: #3a4a5a; letter-spacing: 0.15em; margin-top: 5px; text-transform: uppercase; }

    #zoom-controls { position: fixed; bottom: 32px; left: 28px; z-index: 600; display: flex; flex-direction: column; gap: 1px; }
    #zoom-controls button { width: 30px; height: 30px; background: #0d1520; border: 1px solid #1e2d40; border-radius: 0; font-family: 'Inter', sans-serif; font-size: 16px; font-weight: 300; color: #c8b88a; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.15s; }
    #zoom-controls button:hover { background: #141e2e; }

    #label { position: fixed; bottom: 28px; right: 28px; z-index: 600; text-align: right; pointer-events: none; }
    #label span { font-size: 9px; font-weight: 300; color: #2a3a4a; letter-spacing: 0.15em; text-transform: uppercase; }
  </style>
</head>
<body>
<div id="title">
  <h1>San Francisco</h1>
  <p>Midnight Blueprint</p>
</div>
<div id="zoom-controls">
  <button onclick="map.zoomIn()">+</button>
  <button onclick="map.zoomOut()">−</button>
</div>
<div id="label"><span>Option 02 / 04</span></div>
<div id="map"></div>
<script>
const SF_BOUNDS = L.latLngBounds([37.6398, -122.5620],[37.9298, -122.3270]);
const map = L.map('map', {
  center: [37.7749, -122.4194], zoom: 13, minZoom: 12, maxZoom: 20,
  zoomControl: false, scrollWheelZoom: true,
  maxBounds: SF_BOUNDS, maxBoundsViscosity: 1.0,
});
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png', {
  attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> © <a href="https://carto.com/">CARTO</a>',
  subdomains: 'abcd', maxZoom: 20,
}).addTo(map);
new OSMBuildings(map).load();
L.control.scale({ imperial: false, metric: true, position: 'bottomright' }).addTo(map);

fetch('https://raw.githubusercontent.com/codeforamerica/click_that_hood/master/public/data/san-francisco.geojson')
  .then(r => r.json()).then(data => {
    L.geoJSON(data, {
      style: { color: '#c8b88a', weight: 0.8, opacity: 0.3, fill: false, dashArray: '3 9' },
      onEachFeature(feature, layer) {
        const name = feature.properties.name; if (!name) return;
        L.tooltip({ permanent: true, direction: 'center', className: 'nhood-label', interactive: false })
          .setContent(name).setLatLng(layer.getBounds().getCenter()).addTo(map);
      }
    }).addTo(map);
  });

const landmarks = [
  { name: 'Golden Gate Bridge', lat: 37.8199, lng: -122.4783, note: 'Opens in 1937. Still the most photographed thing in the city — for good reason.' },
  { name: 'Alcatraz Island', lat: 37.8267, lng: -122.4230, note: 'A mile and a half from shore. Felt like the edge of the world if you were inside.' },
  { name: 'Twin Peaks', lat: 37.7525, lng: -122.4477, note: 'On clear days you can see everything. On foggy days, you can see the fog eating everything.' },
  { name: 'Coit Tower', lat: 37.8024, lng: -122.4058, note: 'Built in 1933. The murals inside are the real reason to go up.' },
  { name: 'Dolores Park', lat: 37.7596, lng: -122.4269, note: 'Every sunny day in SF happens here, simultaneously, with a burrito.' },
  { name: 'The Castro', lat: 37.7609, lng: -122.4350, note: 'A neighborhood that fought hard to exist and never stopped being itself.' },
  { name: 'Haight–Ashbury', lat: 37.7692, lng: -122.4481, note: 'Summer of Love was 1967. The vintage shops opened shortly after and never closed.' },
  { name: 'SoMa', lat: 37.7785, lng: -122.4056, note: 'Warehouses became startups became restaurants became expensive.' },
  { name: "Fisherman's Wharf", lat: 37.8080, lng: -122.4169, note: 'The sourdough bread bowl is not a joke. Get one.' },
  { name: 'Chinatown', lat: 37.7941, lng: -122.4063, note: 'Oldest Chinatown in North America. The bakeries open early. Go early.' },
  { name: 'Painted Ladies', lat: 37.7762, lng: -122.4334, note: 'Six Victorian houses on a hill. Alamo Square Park is always full across from them.' },
  { name: 'Sutro Tower', lat: 37.7552, lng: -122.4528, note: 'Visible from almost anywhere in the city. Haunts the fog like a ghost antenna.' },
];

const dotMarker = (color) => L.divIcon({
  className: '',
  html: `<svg width="10" height="10" viewBox="0 0 10 10"><circle cx="5" cy="5" r="3.5" fill="none" stroke="${color}" stroke-width="1.2"/><circle cx="5" cy="5" r="1.5" fill="${color}"/></svg>`,
  iconSize: [10, 10], iconAnchor: [5, 5],
});

landmarks.forEach(d => {
  L.marker([d.lat, d.lng], { icon: dotMarker('#c8b88a'), title: d.name })
    .bindPopup(`<div class="popup-inner"><div class="p-name">${d.name}</div><div class="p-note">${d.note}</div><div class="p-coords">${d.lat.toFixed(4)}° N &nbsp; ${Math.abs(d.lng).toFixed(4)}° W</div></div>`, { maxWidth: 260, closeButton: true })
    .addTo(map);
});
</script>
</body>
</html>
