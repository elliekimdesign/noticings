<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>A · Editorial — card redesign</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Infant:wght@300;400;500;600&family=Inter:wght@400;500;600;700;800&family=Hanken+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #faf7ee;
      color: #1a1a1a;
      min-height: 100vh;
      font-family: 'Hanken Grotesk', sans-serif;
    }
    .back {
      position: fixed; top: 24px; left: 32px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
      color: #1a1a1a; text-decoration: none; opacity: 0.55;
    }
    .back:hover { opacity: 1; }
    .stage {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 80px 32px;
    }
    .rail {
      width: 400px;
      border: 1.5px solid #666;
      background: #faf7ee;
    }

    /* ── A · Editorial ── */
    .card {
      padding: 32px 28px 36px;
      border-bottom: 1.5px solid #666;
      display: grid;
      grid-template-columns: auto 1fr;
      grid-template-rows: auto auto;
      gap: 8px 18px;
      align-items: start;
    }
    .card .num {
      grid-row: 1 / 3;
      font-family: 'Cormorant Infant', 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 132px;
      line-height: 0.85;
      color: #1a1a1a;
      letter-spacing: -0.02em;
    }
    .card .lbl {
      align-self: end;
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(26,26,26,0.6);
      writing-mode: vertical-rl;
      transform: rotate(180deg);
      align-self: start;
      padding-top: 8px;
    }
    .card .q {
      grid-column: 1 / -1;
      margin-top: 18px;
      font-family: 'Cormorant Infant', 'Cormorant Garamond', serif;
      font-weight: 400;
      font-size: 36px;
      line-height: 1.05;
      color: #1a1a1a;
      letter-spacing: -0.005em;
    }

    /* ── Past rows ── */
    .row {
      padding: 18px 28px;
      border-bottom: 1.5px solid #666;
      display: flex;
      align-items: baseline;
      gap: 14px;
    }
    .row:last-child { border-bottom: none; }
    .row .num {
      font-family: 'Cormorant Infant', serif;
      font-weight: 400;
      font-size: 26px;
      line-height: 1;
      color: #1a1a1a;
      flex-shrink: 0;
    }
    .row .q {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(26,26,26,0.6);
      line-height: 1.5;
    }
  </style>
</head>
<body>

<a class="back" href="card-redesign-INDEX.html">← all designs</a>

<div class="stage">
  <div class="rail">

    <div class="card">
      <div class="num">01</div>
      <div class="lbl">Assignment</div>
      <div class="q">I keep coming back to…</div>
    </div>

    <div class="row">
      <div class="num">02</div>
      <div class="q">The thing I miss most is…</div>
    </div>

    <div class="row">
      <div class="num">03</div>
      <div class="q">A street I walk on Sundays</div>
    </div>

  </div>
</div>

</body>
</html>
