<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Print test — 2 · Cartouche</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #f9f7f1; color: #1a1a1a; font-family: 'Geist', sans-serif; min-height: 100vh; position: relative; overflow: hidden; }
    .back { position: fixed; top: 24px; left: 32px; font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: #1a1a1a; text-decoration: none; opacity: 0.55; }
    .back:hover { opacity: 1; }
    .icon-btn { position: fixed; top: 56px; right: 22px; width: 56px; height: 56px; background: transparent; border: none; padding: 0; cursor: pointer; opacity: 0.78; transition: opacity 0.3s ease, transform 0.2s ease; }
    .icon-btn:hover { opacity: 1; transform: scale(1.04); }
    .icon-btn.active { opacity: 1; }
    .icon-btn svg { width: 100%; height: 100%; display: block; overflow: visible; }
    /* Cartouche: compass star spins slightly when active */
    .icon-btn .star-group { transform-origin: 28px 28px; transition: transform 0.7s cubic-bezier(0.65, 0, 0.35, 1); }
    .icon-btn.active .star-group { transform: rotate(45deg); }
    .label-stack { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; }
    .opt { font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 600; letter-spacing: 0.16em; color: #FF8000; margin-bottom: 8px; }
    .name { font-family: 'Geist', sans-serif; font-size: 28px; font-weight: 500; letter-spacing: -0.005em; margin-bottom: 12px; }
    .hint { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(26,26,26,0.45); }
  </style>
</head>
<body>

<a class="back" href="print-test-INDEX.html">← all options</a>

<button class="icon-btn" id="icon" title="Click to toggle">
  <svg viewBox="0 0 56 56" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="#1a1a1a" stroke-width="0.9" stroke-linecap="round" stroke-linejoin="round">
    <!-- Outer scroll/cartouche frame -->
    <path d="M 8 18 Q 6 28 8 38 Q 14 42 28 42 Q 42 42 48 38 Q 50 28 48 18 Q 42 14 28 14 Q 14 14 8 18 Z" stroke-width="1.1"/>
    <!-- Inner double-line border -->
    <path d="M 11 21 Q 10 28 11 35 Q 16 38 28 38 Q 40 38 45 35 Q 46 28 45 21 Q 40 18 28 18 Q 16 18 11 21 Z" stroke-width="0.5"/>
    <!-- Decorative scroll knobs left & right -->
    <circle cx="6" cy="28" r="2" stroke-width="0.7"/>
    <circle cx="50" cy="28" r="2" stroke-width="0.7"/>
    <!-- Compass star group (rotates on active) -->
    <g class="star-group">
      <!-- 4-pointed cardinal star -->
      <polygon points="28,18 30,28 28,38 26,28" fill="#1a1a1a" stroke="none"/>
      <polygon points="18,28 28,26 38,28 28,30" fill="#1a1a1a" stroke="none"/>
      <!-- 4 smaller diagonal points -->
      <polygon points="28,22 28.8,28 28,32 27.2,28" fill="#f9f7f1" stroke-width="0.4"/>
      <line x1="22" y1="22" x2="34" y2="34" stroke-width="0.4"/>
      <line x1="34" y1="22" x2="22" y2="34" stroke-width="0.4"/>
      <!-- Center dot -->
      <circle cx="28" cy="28" r="1.4" fill="#FF8000" stroke="none"/>
    </g>
    <!-- N marker dot above star -->
    <circle cx="28" cy="15.5" r="0.7" fill="#1a1a1a" stroke="none"/>
  </svg>
</button>

<div class="label-stack">
  <div class="opt">OPTION 2</div>
  <div class="name">Map cartouche / compass rose</div>
  <div class="hint">click the icon (top right)</div>
</div>

<script>
  document.getElementById('icon').addEventListener('click', e => e.currentTarget.classList.toggle('active'));
</script>
</body>
</html>
