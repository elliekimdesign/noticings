<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Eye test — C · Shutter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #f9f7f1; color: #1a1a1a; font-family: 'Geist', sans-serif; min-height: 100vh; position: relative; overflow: hidden; }
    .back { position: fixed; top: 24px; left: 32px; font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: #1a1a1a; text-decoration: none; opacity: 0.55; }
    .back:hover { opacity: 1; }
    .icon-btn { position: fixed; top: 56px; right: 22px; width: 36px; height: 36px; background: transparent; border: none; padding: 0; cursor: pointer; opacity: 0.55; transition: opacity 0.3s ease, transform 0.2s ease; }
    .icon-btn:hover { opacity: 0.85; transform: scale(1.06); }
    .icon-btn.active { opacity: 1; }
    .icon-btn svg { width: 100%; height: 100%; display: block; overflow: visible; }
    /* C — shutter: 4 vertical lines that spread apart on active */
    .icon-btn .slat { transition: transform 0.4s cubic-bezier(0.65, 0, 0.35, 1); transform-origin: 16px 16px; }
    .icon-btn.active .s1 { transform: translateX(-4px); }
    .icon-btn.active .s2 { transform: translateX(-1.5px); }
    .icon-btn.active .s3 { transform: translateX(1.5px); }
    .icon-btn.active .s4 { transform: translateX(4px); }
    .label-stack { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; }
    .opt { font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 600; letter-spacing: 0.16em; color: #FF8000; margin-bottom: 8px; }
    .name { font-family: 'Geist', sans-serif; font-size: 28px; font-weight: 500; letter-spacing: -0.005em; color: #1a1a1a; margin-bottom: 12px; }
    .hint { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(26,26,26,0.45); }
  </style>
</head>
<body>

<a class="back" href="eye-test-INDEX.html">← all options</a>

<button class="icon-btn" id="icon" title="Click to toggle">
  <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" stroke="#1a1a1a" stroke-width="1.6" stroke-linecap="round" fill="none">
    <line class="slat s1" x1="11" y1="6" x2="11" y2="26"/>
    <line class="slat s2" x1="14.5" y1="6" x2="14.5" y2="26"/>
    <line class="slat s3" x1="17.5" y1="6" x2="17.5" y2="26"/>
    <line class="slat s4" x1="21" y1="6" x2="21" y2="26"/>
  </svg>
</button>

<div class="label-stack">
  <div class="opt">OPTION C</div>
  <div class="name">Shutter / slats</div>
  <div class="hint">click the icon (top right)</div>
</div>

<script>
  document.getElementById('icon').addEventListener('click', e => e.currentTarget.classList.toggle('active'));
</script>
</body>
</html>
