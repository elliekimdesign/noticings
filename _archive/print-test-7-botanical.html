<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Print test — 7 · Botanical</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #f9f7f1; color: #1a1a1a; font-family: 'Geist', sans-serif; min-height: 100vh; position: relative; overflow: hidden; }
    .back { position: fixed; top: 24px; left: 32px; font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: #1a1a1a; text-decoration: none; opacity: 0.55; }
    .back:hover { opacity: 1; }
    .icon-btn { position: fixed; top: 56px; right: 22px; width: 56px; height: 56px; background: transparent; border: none; padding: 0; cursor: pointer; opacity: 0.85; transition: opacity 0.3s ease, transform 0.2s ease; }
    .icon-btn:hover { opacity: 1; transform: scale(1.04); }
    .icon-btn.active { opacity: 1; }
    .icon-btn svg { width: 100%; height: 100%; display: block; overflow: visible; }
    /* Botanical: petals (eyelashes) bloom open on active */
    .icon-btn .petal { transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); transform-origin: 28px 28px; }
    .icon-btn.active .p1 { transform: rotate(-15deg) translateY(-2px); }
    .icon-btn.active .p2 { transform: rotate(-7deg) translateY(-3px); }
    .icon-btn.active .p3 { transform: translateY(-3.5px); }
    .icon-btn.active .p4 { transform: rotate(7deg) translateY(-3px); }
    .icon-btn.active .p5 { transform: rotate(15deg) translateY(-2px); }
    .label-stack { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; }
    .opt { font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 600; letter-spacing: 0.16em; color: #FF8000; margin-bottom: 8px; }
    .name { font-family: 'Geist', sans-serif; font-size: 28px; font-weight: 500; letter-spacing: -0.005em; margin-bottom: 12px; }
    .hint { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(26,26,26,0.45); }
  </style>
</head>
<body>

<a class="back" href="print-test-INDEX.html">← all options</a>

<button class="icon-btn" id="icon" title="Click to toggle">
  <svg viewBox="0 0 56 56" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="#1a1a1a" stroke-linecap="round" stroke-linejoin="round">
    <!-- Stem (botanical illustrations always show the stem) -->
    <path d="M 28 50 Q 27 42 28 35" stroke-width="1.1"/>
    <!-- Leaf on stem -->
    <path d="M 27 44 Q 22 43 21 41 Q 22 40 25 41 Q 27 42 27 44" stroke-width="0.8" fill="#f9f7f1"/>
    <!-- Leaf veins -->
    <line x1="22" y1="42" x2="26" y2="42.5" stroke-width="0.4"/>
    <!-- Eye-flower base / sepal at the bottom of bloom -->
    <path d="M 24 35 Q 28 33 32 35" stroke-width="0.9"/>
    <!-- Bloom: 5 petals (eyelashes) arranged in a fan above the eye-iris -->
    <g class="petal p1"><path d="M 19 22 Q 16 14 18 11 Q 20 14 21 21" stroke-width="0.9" fill="#f9f7f1"/></g>
    <g class="petal p2"><path d="M 23 19 Q 22 11 24 8 Q 26 11 26 18" stroke-width="0.9" fill="#f9f7f1"/></g>
    <g class="petal p3"><path d="M 28 18 Q 27 8 28 5 Q 29 8 28 18" stroke-width="0.9" fill="#f9f7f1"/></g>
    <g class="petal p4"><path d="M 33 19 Q 34 11 32 8 Q 30 11 30 18" stroke-width="0.9" fill="#f9f7f1"/></g>
    <g class="petal p5"><path d="M 37 22 Q 40 14 38 11 Q 36 14 35 21" stroke-width="0.9" fill="#f9f7f1"/></g>
    <!-- Center: the eye/iris bloom face -->
    <ellipse cx="28" cy="28" rx="9" ry="6" fill="#f9f7f1" stroke-width="1.2"/>
    <circle cx="28" cy="28" r="3" fill="#1a1a1a" stroke="none"/>
    <circle cx="27" cy="27" r="0.8" fill="#f9f7f1" stroke="none"/>
    <!-- Specimen label number underneath -->
    <text x="46" y="51" font-family="serif" font-style="italic" font-size="5" fill="#1a1a1a" stroke="none">vii</text>
  </svg>
</button>

<div class="label-stack">
  <div class="opt">OPTION 7</div>
  <div class="name">Botanical specimen</div>
  <div class="hint">click the icon (top right)</div>
</div>

<script>
  document.getElementById('icon').addEventListener('click', e => e.currentTarget.classList.toggle('active'));
</script>
</body>
</html>
