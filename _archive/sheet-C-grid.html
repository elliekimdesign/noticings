<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Sheet C — Grid & Silence</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,ital,wght@9..144,0,300;9..144,0,400;9..144,0,500;9..144,1,400&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #f4f4f5;
      min-height: 100vh;
      padding: 60px;
      font-family: 'Geist', sans-serif;
    }
    .label {
      font-size: 10px; letter-spacing: 0.28em; text-transform: uppercase;
      color: #999; font-weight: 500; margin-bottom: 30px;
    }
    .stage {
      background: #fff;
      width: 100%; max-width: 480px;
      height: 480px;
      padding: 0;
      position: relative;
      border: 1px solid rgba(0,0,0,0.06);
    }
    /* The 3x3 grid */
    .grid {
      width: 100%; height: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      grid-template-rows: 1fr 1fr 1fr;
    }
    .cell {
      position: relative;
      padding: 20px;
      display: flex;
      align-items: flex-start;
    }
    /* Faint gold grid lines */
    .cell:nth-child(1), .cell:nth-child(2),
    .cell:nth-child(4), .cell:nth-child(5),
    .cell:nth-child(7), .cell:nth-child(8) {
      border-right: 0.5px solid rgba(200,154,62,0.35);
    }
    .cell:nth-child(1), .cell:nth-child(2), .cell:nth-child(3),
    .cell:nth-child(4), .cell:nth-child(5), .cell:nth-child(6) {
      border-bottom: 0.5px solid rgba(200,154,62,0.35);
    }
    /* Top-left: location label */
    .cell-loc {
      font-family: 'Geist', sans-serif;
      font-size: 9px; letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(26,26,26,0.6);
      font-weight: 500;
      line-height: 1.5;
    }
    /* Center cell: the input */
    .cell-input {
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .cell-input .input-text {
      font-family: 'Fraunces', serif;
      font-optical-sizing: auto;
      font-size: 18px;
      font-weight: 400;
      color: #1a1a1a;
      line-height: 1.4;
      width: 100%;
    }
    .cell-input .input-text .placeholder {
      color: rgba(26,26,26,0.3);
      font-style: italic;
    }
    .cell-input .input-text .cursor {
      display: inline-block;
      width: 1.5px; height: 0.85em;
      background: #c89a3e;
      vertical-align: -0.05em;
      margin-left: 3px;
      animation: blink 1s steps(1) infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }
    /* Bottom-right: pin action */
    .cell-pin {
      align-items: flex-end;
      justify-content: flex-end;
      text-align: right;
    }
    .cell-pin .pin-text {
      font-family: 'Geist', sans-serif;
      font-size: 10px; letter-spacing: 0.28em;
      text-transform: uppercase;
      color: #c89a3e;
      font-weight: 500;
      cursor: pointer;
    }
    /* Top-right: tiny meta */
    .cell-meta {
      justify-content: flex-end;
      text-align: right;
    }
    .cell-meta .meta-text {
      font-family: 'Geist', sans-serif;
      font-size: 9px; letter-spacing: 0.18em;
      color: rgba(26,26,26,0.35);
      font-weight: 400;
      width: 100%;
    }
  </style>
</head>
<body>
  <div class="label">C — Grid & Silence · inspired by Agnes Martin</div>
  <div class="stage">
    <div class="grid">
      <div class="cell"><div class="cell-loc">Mission<br>Dolores</div></div>
      <div class="cell"></div>
      <div class="cell cell-meta"><div class="meta-text">Nº 047</div></div>
      <div class="cell"></div>
      <div class="cell cell-input">
        <div class="input-text">
          <span class="placeholder">a quiet bench by the palm trees<span class="cursor"></span></span>
        </div>
      </div>
      <div class="cell"></div>
      <div class="cell"></div>
      <div class="cell"></div>
      <div class="cell cell-pin"><div class="pin-text">pin →</div></div>
    </div>
  </div>
</body>
</html>
