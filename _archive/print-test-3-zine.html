<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Print test — 3 · Zine / Riso</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #f9f7f1; color: #1a1a1a; font-family: 'Geist', sans-serif; min-height: 100vh; position: relative; overflow: hidden; }
    .back { position: fixed; top: 24px; left: 32px; font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: #1a1a1a; text-decoration: none; opacity: 0.55; }
    .back:hover { opacity: 1; }
    .icon-btn { position: fixed; top: 56px; right: 22px; width: 56px; height: 56px; background: transparent; border: none; padding: 0; cursor: pointer; opacity: 0.85; transition: opacity 0.3s ease, transform 0.2s ease; }
    .icon-btn:hover { opacity: 1; transform: scale(1.04); }
    .icon-btn.active { opacity: 1; }
    .icon-btn svg { width: 100%; height: 100%; display: block; overflow: visible; }
    /* Zine: orange "ink" layer shifts further off-register on active for that "extra Riso" feel */
    .icon-btn .riso-orange { transition: transform 0.3s ease; }
    .icon-btn.active .riso-orange { transform: translate(2px, -1.5px); }
    .label-stack { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; }
    .opt { font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 600; letter-spacing: 0.16em; color: #FF8000; margin-bottom: 8px; }
    .name { font-family: 'Geist', sans-serif; font-size: 28px; font-weight: 500; letter-spacing: -0.005em; margin-bottom: 12px; }
    .hint { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(26,26,26,0.45); }
  </style>
</head>
<body>

<a class="back" href="print-test-INDEX.html">← all options</a>

<button class="icon-btn" id="icon" title="Click to toggle">
  <svg viewBox="0 0 56 56" xmlns="http://www.w3.org/2000/svg">
    <!-- Orange Riso ink layer (slightly off-register, soft) -->
    <g class="riso-orange" opacity="0.85">
      <ellipse cx="29" cy="28" rx="20" ry="11" fill="#FF8000"/>
      <circle cx="29" cy="28" r="6.5" fill="#FF8000"/>
    </g>
    <!-- Black "second pass" outline — hand-drawn, slightly wobbly -->
    <g fill="none" stroke="#1a1a1a" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <!-- Wonky almond eye -->
      <path d="M 7 28 Q 13 16 28 15 Q 43 16 49 28 Q 43 41 28 41 Q 13 41 7 28"/>
      <!-- Iris (intentionally a slightly squished circle) -->
      <ellipse cx="28" cy="28" rx="6.5" ry="7"/>
      <!-- Pupil -->
      <circle cx="28" cy="28" r="2.4" fill="#1a1a1a"/>
      <!-- Crooked top eyelashes (3 marks) -->
      <line x1="18" y1="14" x2="17" y2="9"/>
      <line x1="28" y1="13" x2="28.5" y2="8"/>
      <line x1="38" y1="14" x2="40" y2="9.5"/>
    </g>
  </svg>
</button>

<div class="label-stack">
  <div class="opt">OPTION 3</div>
  <div class="name">Zine / risograph</div>
  <div class="hint">click the icon (top right)</div>
</div>

<script>
  document.getElementById('icon').addEventListener('click', e => e.currentTarget.classList.toggle('active'));
</script>
</body>
</html>
