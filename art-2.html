<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SF — Ember</title>
  <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100vw; height: 100vh; overflow: hidden; background: #0a0805; }
    #map { width: 100vw; height: 100vh; }
    .maplibregl-ctrl-logo, .maplibregl-ctrl-attrib, .maplibregl-ctrl-group { display: none !important; }
    #ctrl {
      position: fixed; bottom: 24px; right: 24px; z-index: 100;
      display: flex; flex-direction: column; gap: 2px;
      opacity: 0.15; transition: opacity 0.3s;
    }
    #ctrl:hover { opacity: 1; }
    #ctrl button {
      width: 28px; height: 28px; background: rgba(200,120,40,0.15);
      border: 1px solid rgba(200,120,40,0.3); border-radius: 0;
      font-size: 14px; color: rgba(200,150,80,0.7); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    #ctrl button:hover { background: rgba(200,120,40,0.25); }
    #ctrl .s { height: 5px; }
  </style>
</head>
<body>
<div id="ctrl">
  <button id="zi">+</button><button id="zo">−</button>
  <div class="s"></div>
  <button id="tl">⊹</button><button id="nr">↑</button>
</div>
<div id="map"></div>
<script>
const map = new maplibregl.Map({
  container: 'map',
  style: 'https://tiles.openfreemap.org/styles/liberty',
  center: [-122.4194, 37.7749],
  zoom: 13, pitch: 52, bearing: -18,
  maxBounds: [[-122.562, 37.639],[-122.327, 37.930]],
  minZoom: 11, maxZoom: 20, attributionControl: false,
});
document.getElementById('zi').onclick = () => map.zoomIn({ duration: 400 });
document.getElementById('zo').onclick = () => map.zoomOut({ duration: 400 });
document.getElementById('nr').onclick = () => map.easeTo({ bearing: 0, pitch: 0, duration: 800 });
document.getElementById('tl').onclick = () => map.easeTo({ pitch: map.getPitch() > 10 ? 0 : 52, duration: 800 });

map.on('style.load', () => {
  const layers = map.getStyle().layers;
  for (const { id, type } of layers) {
    try {
      if (type === 'symbol' || type === 'fill-extrusion') { map.removeLayer(id); continue; }
      if (id === 'background') { map.setPaintProperty(id, 'background-color', '#100c08'); continue; }
      if (/water|ocean|sea|bay|lake|river/.test(id)) {
        if (type === 'fill') map.setPaintProperty(id, 'fill-color', '#060402');
        if (type === 'line') map.setPaintProperty(id, 'line-color', '#0a0804');
        continue;
      }
      if (/park|grass|wood|forest|nature|garden|cemetery|scrub/.test(id)) {
        if (type === 'fill') map.setPaintProperty(id, 'fill-color', '#120e08');
        continue;
      }
      if (/road|street|highway|motorway|path|footway|rail|transit/.test(id)) {
        if (type === 'line') map.setPaintProperty(id, 'line-opacity', 0);
        if (type === 'fill') map.setPaintProperty(id, 'fill-opacity', 0);
        continue;
      }
      if (/building/.test(id) && type === 'fill') {
        map.setPaintProperty(id, 'fill-color', '#1a1208'); map.setPaintProperty(id, 'fill-opacity', 1); continue;
      }
      if (type === 'fill') { map.setPaintProperty(id, 'fill-color', '#100c08'); map.setPaintProperty(id, 'fill-opacity', 1); }
      if (type === 'line') map.setPaintProperty(id, 'line-opacity', 0);
    } catch(_) {}
  }

  // Buildings burn amber→white — pure heat gradient
  map.addLayer({
    id: 'buildings-3d',
    type: 'fill-extrusion',
    source: 'openmaptiles',
    'source-layer': 'building',
    minzoom: 13,
    paint: {
      'fill-extrusion-height': [
        'interpolate', ['linear'], ['zoom'], 13, 0, 14,
        ['coalesce', ['get', 'render_height'], ['*', ['coalesce', ['get', 'building_levels'], 2], 3.5]]
      ],
      'fill-extrusion-base': ['coalesce', ['get', 'render_min_height'], 0],
      'fill-extrusion-color': [
        'interpolate', ['linear'],
        ['coalesce', ['get', 'render_height'], 6],
        0,   '#1e1208',
        6,   '#3a2010',
        15,  '#6a3818',
        30,  '#9a5420',
        60,  '#c87830',
        100, '#e09840',
        180, '#f0c060',
        300, '#f8e090'
      ],
      'fill-extrusion-opacity': 0.98,
      'fill-extrusion-ambient-occlusion-intensity': 0.8,
      'fill-extrusion-ambient-occlusion-radius': 6,
    }
  });
});
</script>
</body>
</html>
