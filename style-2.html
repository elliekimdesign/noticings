<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SF — Shadow Only</title>
  <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100vw; height: 100vh; overflow: hidden; background: #f8f8f8; }
    #map { width: 100vw; height: 100vh; }
    .maplibregl-ctrl-logo, .maplibregl-ctrl-attrib, .maplibregl-ctrl-group { display: none !important; }
    #ctrl {
      position: fixed; bottom: 24px; right: 24px; z-index: 300;
      display: flex; flex-direction: column; gap: 2px;
      opacity: 0.12; transition: opacity 0.3s;
    }
    #ctrl:hover { opacity: 1; }
    #ctrl button {
      width: 28px; height: 28px; background: rgba(255,255,255,0.9);
      border: 1px solid #ddd; border-radius: 0; font-size: 14px;
      color: #555; cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    #ctrl button:hover { background: #fff; }
    #ctrl .s { height: 5px; }
  </style>
</head>
<body>
<div id="ctrl">
  <button id="zi">+</button><button id="zo">−</button>
  <div class="s"></div>
  <button id="tl">⊹</button><button id="nr">↑</button>
</div>
<div id="map"></div>
<script>
const map = new maplibregl.Map({
  container: 'map',
  style: 'https://tiles.openfreemap.org/styles/liberty',
  center: [-122.4194, 37.7749],
  zoom: 13, pitch: 55, bearing: -20,
  maxBounds: [[-122.562, 37.639],[-122.327, 37.930]],
  minZoom: 11, maxZoom: 20, attributionControl: false,
});
document.getElementById('zi').onclick = () => map.zoomIn({ duration: 400 });
document.getElementById('zo').onclick = () => map.zoomOut({ duration: 400 });
document.getElementById('nr').onclick = () => map.easeTo({ bearing: 0, pitch: 0, duration: 700 });
document.getElementById('tl').onclick = () => map.easeTo({ pitch: map.getPitch() > 10 ? 0 : 55, duration: 700 });

map.on('style.load', () => {
  const layers = map.getStyle().layers;
  for (const { id, type } of layers) {
    try {
      if (type === 'symbol' || type === 'fill-extrusion') { map.removeLayer(id); continue; }
      // Erase everything — total white canvas
      if (type === 'fill') { map.setPaintProperty(id, 'fill-color', '#f8f8f8'); map.setPaintProperty(id, 'fill-opacity', 1); }
      if (type === 'line') map.setPaintProperty(id, 'line-opacity', 0);
      if (id === 'background') map.setPaintProperty(id, 'background-color', '#f8f8f8');
    } catch(_) {}
  }

  // Buildings nearly invisible — same white as background
  // Only the ambient occlusion shadow makes them exist
  map.addLayer({
    id: 'buildings-3d',
    type: 'fill-extrusion',
    source: 'openmaptiles',
    'source-layer': 'building',
    minzoom: 12,
    paint: {
      'fill-extrusion-height': [
        'interpolate', ['linear'], ['zoom'],
        12, 0,
        13, ['coalesce', ['get', 'render_height'], ['*', ['coalesce', ['get', 'building_levels'], 2], 3.5]]
      ],
      'fill-extrusion-base': ['coalesce', ['get', 'render_min_height'], 0],
      // Faces nearly white — only shadow gives form
      'fill-extrusion-color': '#f0f0f0',
      'fill-extrusion-opacity': 0.95,
      'fill-extrusion-ambient-occlusion-intensity': 0.9,
      'fill-extrusion-ambient-occlusion-radius': 12,
    }
  });
});
</script>
</body>
</html>
