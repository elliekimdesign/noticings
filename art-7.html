<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SF — Blueprint Pale</title>
  <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100vw; height: 100vh; overflow: hidden; background: #f0f3f7; }
    #map { width: 100vw; height: 100vh; }
    .maplibregl-ctrl-logo, .maplibregl-ctrl-attrib, .maplibregl-ctrl-group { display: none !important; }
    #ctrl {
      position: fixed; bottom: 24px; right: 24px; z-index: 300;
      display: flex; flex-direction: column; gap: 2px;
      opacity: 0.12; transition: opacity 0.3s;
    }
    #ctrl:hover { opacity: 1; }
    #ctrl button {
      width: 28px; height: 28px; background: rgba(255,255,255,0.9);
      border: 1px solid #b8c4d0; border-radius: 0; font-size: 14px;
      color: #7090a8; cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    #ctrl button:hover { background: #fff; }
    #ctrl .s { height: 5px; }
  </style>
</head>
<body>
<div id="ctrl">
  <button id="zi">+</button><button id="zo">−</button>
  <div class="s"></div>
  <button id="tl">⊹</button><button id="nr">↑</button>
</div>
<div id="map"></div>
<script>
const map = new maplibregl.Map({
  container: 'map',
  style: 'https://tiles.openfreemap.org/styles/liberty',
  center: [-122.4194, 37.7749],
  zoom: 12.5, pitch: 48, bearing: -16,
  maxBounds: [[-122.562, 37.639],[-122.327, 37.930]],
  minZoom: 11, maxZoom: 20, attributionControl: false,
});
document.getElementById('zi').onclick = () => map.zoomIn({ duration: 400 });
document.getElementById('zo').onclick = () => map.zoomOut({ duration: 400 });
document.getElementById('nr').onclick = () => map.easeTo({ bearing: 0, pitch: 0, duration: 700 });
document.getElementById('tl').onclick = () => map.easeTo({ pitch: map.getPitch() > 10 ? 0 : 48, duration: 700 });

map.on('style.load', () => {
  const layers = map.getStyle().layers;
  for (const { id, type } of layers) {
    try {
      if (type === 'symbol' || type === 'fill-extrusion') { map.removeLayer(id); continue; }
      if (id === 'background') { map.setPaintProperty(id, 'background-color', '#f0f3f7'); continue; }

      // Water — slightly deeper cool blue, defining the bay shape
      if (/water|ocean|sea|bay|lake|river/.test(id)) {
        if (type === 'fill') { map.setPaintProperty(id, 'fill-color', '#d8e4ee'); map.setPaintProperty(id, 'fill-opacity', 1); }
        if (type === 'line') map.setPaintProperty(id, 'line-opacity', 0);
        continue;
      }
      // Everything else — flat pale blue-white, no contrast
      if (/park|grass|wood|forest|nature|garden|cemetery|scrub|meadow|landuse|landcover|land-|earth|sand|beach/.test(id)) {
        if (type === 'fill') { map.setPaintProperty(id, 'fill-color', '#f0f3f7'); map.setPaintProperty(id, 'fill-opacity', 1); }
        if (type === 'line') map.setPaintProperty(id, 'line-opacity', 0);
        continue;
      }
      // All roads hidden — contours only
      if (/motorway|trunk|primary|secondary|road|street|tertiary|minor|service|path|footway|cycleway|pedestrian|rail|transit/.test(id)) {
        if (type === 'line') map.setPaintProperty(id, 'line-opacity', 0);
        if (type === 'fill') map.setPaintProperty(id, 'fill-opacity', 0);
        continue;
      }
      // Buildings — faint cool-white footprints
      if (/building/.test(id) && type === 'fill') {
        map.setPaintProperty(id, 'fill-color', '#e8ecf2');
        map.setPaintProperty(id, 'fill-opacity', 1);
        map.setPaintProperty(id, 'fill-outline-color', 'transparent');
        continue;
      }
      if (type === 'fill') { map.setPaintProperty(id, 'fill-color', '#f0f3f7'); map.setPaintProperty(id, 'fill-opacity', 1); }
      if (type === 'line') map.setPaintProperty(id, 'line-opacity', 0);
    } catch(_) {}
  }

  // Contours in cool blue-grey — like a technical drawing or architect's print
  map.addLayer({
    id: 'contour-minor',
    type: 'line',
    source: 'openmaptiles',
    'source-layer': 'contour',
    filter: ['!=', ['%', ['get', 'ele'], 100], 0],
    paint: {
      'line-color': '#a8b8c8',
      'line-width': ['interpolate',['linear'],['zoom'], 11,0.2, 14,0.45],
      'line-opacity': ['interpolate',['linear'],['zoom'], 11,0.35, 14,0.6, 16,0.2],
    }
  });
  map.addLayer({
    id: 'contour-major',
    type: 'line',
    source: 'openmaptiles',
    'source-layer': 'contour',
    filter: ['==', ['%', ['get', 'ele'], 100], 0],
    paint: {
      'line-color': ['interpolate',['linear'],['get','ele'], 0,'#90a8c0', 100,'#7090aa', 200,'#507898', 300,'#385e80'],
      'line-width': ['interpolate',['linear'],['zoom'], 11,0.8, 13,1.4, 15,2.0],
      'line-opacity': ['interpolate',['linear'],['zoom'], 11,0.6, 13,0.85, 16,0.35],
    }
  });

  // Very faint building outlines at high zoom — like a lightly penciled plan
  map.addLayer({
    id: 'building-ink',
    type: 'line',
    source: 'openmaptiles',
    'source-layer': 'building',
    minzoom: 14,
    paint: { 'line-color': '#98aac0', 'line-width': 0.3, 'line-opacity': 0.5 }
  });
});
</script>
</body>
</html>
